                                            {enableOALA && <Icons.CheckCircle />}
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-stone-800 dark:text-stone-200">長者生活津貼 (長生津) <span className="text-sage-500 ml-1">+$4,345/月</span></p>
                                            <p className="text-[10px] text-stone-500 mt-0.5">65歲起生效。需入息/資產審查。若啟動此項將覆蓋生果金。</p>
                                        </div>
                                    </div>
                                    
                                    <div className={`flex items-start gap-3 p-3 rounded-lg border border-stone-200/50 dark:border-stone-700/50 ${enableOALA ? 'opacity-50 grayscale bg-transparent' : 'bg-stone-50 dark:bg-stone-800/30'}`}>
                                        <div className="mt-0.5 w-4 h-4 rounded border border-stone-400 bg-stone-200 dark:bg-stone-700 dark:border-stone-500 text-stone-600 dark:text-stone-300 flex items-center justify-center shrink-0 cursor-not-allowed">
                                            <Icons.CheckCircle />
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-stone-800 dark:text-stone-200">高齡津貼 (生果金) <span className="text-clay-500 ml-1">+$1,675/月</span></p>
                                            <p className="text-[10px] text-stone-500 mt-0.5">70歲起必選生效。免審查。若未領取長生津，系統預設代入此項。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>

                    {/* 右欄：圖表與里程碑 */}
                    <div className="lg:col-span-2 space-y-6">
                        <Card className="p-4 md:p-6 flex flex-col h-full">
                            
                            <div className="flex flex-col sm:flex-row justify-between sm:items-start mb-4 gap-4">
                                <SectionTitle title="複利與通脹折算曲線 (含 MPF 及津貼)" subtitle="Wealth Trajectory & Allowances" className="mb-0" />
                                <div className="flex gap-2 shrink-0">
                                    <div className="flex flex-col text-right bg-stone-50/50 dark:bg-stone-800/40 p-2 md:p-3 rounded-lg border border-stone-200/50 dark:border-stone-700/50 min-w-[120px]">
                                        <div className="text-[9px] md:text-[10px] text-stone-500 font-bold uppercase tracking-widest mb-0.5">終極目標總額</div>
                                        <div className="text-lg md:text-xl font-black text-stone-900 dark:text-stone-100 leading-none mt-0.5">${Math.round(target).toLocaleString()}</div>
                                        <div className="text-[8px] md:text-[9px] text-stone-500 mt-1 font-medium">含 ${Math.round(cashTent).toLocaleString()} 兩年緩衝</div>
                                    </div>
                                    <div className="flex flex-col text-right bg-sage-50/30 dark:bg-sage-900/10 p-2 md:p-3 rounded-lg border border-sage-200/50 dark:border-sage-800/30 min-w-[120px]">
                                        <div className="text-[9px] md:text-[10px] text-sage-600/80 dark:text-sage-500 font-bold uppercase tracking-widest mb-0.5">達標需時</div>
                                        {hit ? (
                                            <>
                                                <div className="text-lg md:text-xl font-black text-sage-600 dark:text-sage-400 leading-none mt-0.5">
                                                    {y > 0 && <>{y}<span className="text-xs font-normal mx-0.5 text-sage-500/70">年</span></>}
                                                    {m > 0 && <>{m}<span className="text-xs font-normal ml-0.5 text-sage-500/70">個月</span></>}
                                                    {y === 0 && m === 0 && '已達標'}
                                                </div>
                                                <div className="text-[8px] md:text-[9px] text-sage-500 mt-1 font-medium">預計: {hit.yearStr}</div>
                                            </>
                                        ) : (
                                            <div className="text-lg font-bold text-stone-600">—</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="w-full h-[350px] lg:h-[450px] relative">
                                <canvas ref={chartRef}></canvas>
                            </div>

                            <div className="mt-8 border-t border-stone-100 dark:border-stone-800 pt-6 space-y-6">
                                <h3 className="text-sm font-bold text-stone-800 dark:text-stone-200 tracking-wider flex items-center gap-2">
                                    <Icons.TrendingUp/> 實質購買力進度碑
                                </h3>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4">
                                    {[1000000, 3000000, 5000000, 10000000].map((milestone) => {
                                        const mData = chartData.data.find(d => d.實質購買力 >= milestone);
                                        return (
                                            <div key={milestone} className="bg-stone-50 dark:bg-stone-800/30 p-3 rounded-xl border border-stone-200/50 dark:border-stone-700/50 text-center flex flex-col justify-center">
                                                <div className="text-[10px] text-stone-500 dark:text-stone-400 mb-1 font-medium tracking-widest">{milestone / 10000}萬 實質門檻</div>
                                                {mData ? (
                                                    <>
                                                        <div className="font-bold text-lg text-stone-900 dark:text-stone-100">{mData.ageStr}</div>
                                                        <div className="text-[9px] text-stone-500 mt-1 uppercase tracking-wider">{mData.yearStr} 達成</div>
                                                    </>
                                                ) : (
                                                    <div className="font-bold text-lg text-stone-300 dark:text-stone-700">—</div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="mt-8 pt-6 border-t border-stone-100 dark:border-stone-800 space-y-4">
                                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 sm:gap-0">
                                        <h3 className="text-sm font-bold text-stone-800 dark:text-stone-200 tracking-wider flex items-center gap-2">
                                            <Icons.Activity/> 動態提領多階層護欄 (GUYTON-KLINGER)
                                        </h3>
                                        <span className="bg-stone-200/50 dark:bg-stone-800 text-stone-600 dark:text-stone-400 text-[10px] px-2 py-1 rounded w-fit">
                                            初始提領率 {withdrawalRate.toFixed(1)}%
                                        </span>
                                    </div>
                                    
                                    <div className="flex gap-2 lg:gap-3 overflow-x-auto hide-scrollbar pb-2 snap-x mt-4">
                                        <div className="snap-start shrink-0 min-w-[130px] md:min-w-0 md:flex-1 p-3 lg:p-4 rounded-xl border border-rose-900/40 bg-rose-950/20 flex flex-col justify-between hover:bg-rose-950/30 smooth-transition">
                                            <div>
                                                <div className="text-rose-500 font-bold text-[10px] lg:text-xs mb-1">紅燈防線 -10%</div>
                                                <div className="text-stone-500 text-[10px] lg:text-[11px]">資產 &lt; {Math.round(baseTarget/1.2 / 10000)}萬</div>
                                            </div>
                                            <div className="text-rose-400 font-black text-base lg:text-xl mt-3 lg:mt-4">${Math.round(targetMonthlyIncome * 0.9).toLocaleString()}</div>
                                        </div>
                                        <div className="snap-start shrink-0 min-w-[130px] md:min-w-0 md:flex-1 p-3 lg:p-4 rounded-xl border border-amber-900/40 bg-amber-950/20 flex flex-col justify-between hover:bg-amber-950/30 smooth-transition">
                                            <div>
                                                <div className="text-amber-500 font-bold text-[10px] lg:text-xs mb-1">黃燈預警 -5%</div>
                                                <div className="text-stone-500 text-[10px] lg:text-[11px]">資產 &lt; {Math.round(baseTarget/1.1 / 10000)}萬</div>
                                            </div>
                                            <div className="text-amber-400 font-black text-base lg:text-xl mt-3 lg:mt-4">${Math.round(targetMonthlyIncome * 0.95).toLocaleString()}</div>
                                        </div>
                                        <div className="snap-start shrink-0 min-w-[140px] md:min-w-0 md:flex-1 p-3 lg:p-4 rounded-xl border-2 border-sage-700/80 bg-sage-900/30 flex flex-col justify-between relative shadow-[0_0_15px_rgba(92,117,90,0.1)] hover:bg-sage-900/40 smooth-transition">
                                            <div>
                                                <div className="text-sage-400 font-bold text-[11px] lg:text-xs mb-1">基準目標點</div>
                                                <div className="text-stone-400 text-[10px] lg:text-[11px]">總額 {Math.round(baseTarget / 10000)}萬</div>
                                            </div>
                                            <div className="text-sage-300 font-black text-lg lg:text-2xl mt-3 lg:mt-4">${Math.round(targetMonthlyIncome).toLocaleString()}</div>
                                        </div>
                                        <div className="snap-start shrink-0 min-w-[130px] md:min-w-0 md:flex-1 p-3 lg:p-4 rounded-xl border border-emerald-900/40 bg-emerald-950/20 flex flex-col justify-between hover:bg-emerald-950/30 smooth-transition">
                                            <div>
                                                <div className="text-emerald-500 font-bold text-[10px] lg:text-xs mb-1">綠燈一階 +5%</div>
                                                <div className="text-stone-500 text-[10px] lg:text-[11px]">資產 &gt; {Math.round(baseTarget/0.9 / 10000)}萬</div>
                                            </div>
                                            <div className="text-emerald-400 font-black text-base lg:text-xl mt-3 lg:mt-4">${Math.round(targetMonthlyIncome * 1.05).toLocaleString()}</div>
                                        </div>
                                        <div className="snap-start shrink-0 min-w-[130px] md:min-w-0 md:flex-1 p-3 lg:p-4 rounded-xl border border-teal-900/40 bg-teal-950/20 flex flex-col justify-between hover:bg-teal-950/30 smooth-transition">
                                            <div>
                                                <div className="text-teal-500 font-bold text-[10px] lg:text-xs mb-1">綠燈二階 +10%</div>
                                                <div className="text-stone-500 text-[10px] lg:text-[11px]">資產 &gt; {Math.round(baseTarget/0.8 / 10000)}萬</div>
                                            </div>
                                            <div className="text-teal-400 font-black text-base lg:text-xl mt-3 lg:mt-4">${Math.round(targetMonthlyIncome * 1.1).toLocaleString()}</div>
                                        </div>
                                    </div>
                                    <p className="text-[10px] text-stone-500 mt-2 leading-relaxed pt-2">
                                        註：當前提領率(CWR)偏離初始設定20%時觸發大階層，偏離10%時觸發預警階層。若遇極端熊市，需確保能承受 10% 的生活費縮減至 ${Math.round(targetMonthlyIncome * 0.9).toLocaleString()} 以保本。
                                    </p>
                                </div>
                            </div>

                        </Card>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
