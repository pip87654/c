<!DOCTYPE html>
<html lang="zh-HK" class="dark" style="background-color: #121212;">
<head>
    <meta charset="UTF-8">
    <!-- 針對手機的終極視口設定：禁止不自然縮放，適配瀏海螢幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>極簡財務與職涯戰情室</title>
    
    <!-- PWA / Mobile Web App 專屬 Meta 標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="財務戰情室">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'] },
                    colors: {
                        sage: { 50: '#f4f7f4', 100: '#e3ebe3', 200: '#c7d7c6', 300: '#a1bea0', 400: '#799477', 500: '#5c755a', 600: '#485c46', 700: '#384837', 800: '#293528', 900: '#1b231a' },
                        clay: { 50: '#fcf6f4', 100: '#f7ebe6', 200: '#f0d8d0', 300: '#e3b9aa', 400: '#cfa293', 500: '#b87a67', 600: '#8f5a4a', 700: '#70463a', 800: '#52332a', 900: '#36211c' },
                        dusty: { 50: '#f5f7f9', 100: '#e9eef2', 200: '#d1dee6', 300: '#aebfcd', 400: '#8ba2b3', 500: '#6b8496', 600: '#4f6675', 700: '#3e505c', 800: '#2d3b44', 900: '#1e272d' },
                        stone: {
                            50: '#faf9f8', 100: '#f5f4f1', 200: '#e8e6e1', 300: '#d6d3cd', 400: '#a8a49c',
                            500: '#7d7971', 600: '#5c5952', 700: '#45423d', 800: '#2e2c29', 900: '#1c1b1a', 950: '#0f0e0d'
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        ::selection { background: #e8e6e1; color: #1c1b1a; }
        .dark ::selection { background: #45423d; color: #faf9f8; }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Range Slider 樣式優化，增強觸控體驗 */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; touch-action: none; }
        input[type=range]::-webkit-slider-runnable-track { height: 8px; background: #e8e6e1; border-radius: 4px; border: none; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #2e2c29; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; margin-top: -8px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .accent-sage::-webkit-slider-thumb { background: #5c755a; }
        .dark .accent-sage::-webkit-slider-thumb { background: #799477; }
        .accent-clay::-webkit-slider-thumb { background: #b87a67; }
        .dark .accent-clay::-webkit-slider-thumb { background: #cfa293; }
        
        /* 避免手機輸入框導致的字體縮放 */
        input[type="number"], input[type="text"] { font-size: 16px !important; }
    </style>
</head>
<body class="bg-stone-50 dark:bg-[#121212] text-stone-800 dark:text-stone-200 transition-colors duration-500 pb-8 safe-area-pb">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icons = {
            Dashboard: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Calculator: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M8 10h.01"/><path d="M12 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-50"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-[#121212] text-stone-200 p-6">
                            <div className="max-w-xl w-full text-center space-y-6">
                                <h2 className="text-xl font-light text-clay-400">系統中斷</h2>
                                <p className="text-sm text-stone-500">請擷取此錯誤日誌以供除錯。</p>
                                <pre className="bg-stone-900 p-4 md:p-6 rounded-lg text-left text-xs md:text-sm text-stone-400 overflow-auto border border-stone-800">{this.state.error?.toString()}</pre>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isDarkMode, setIsDarkMode] = useState(true); 

            const useLocalStorage = (key, initialValue) => {
                const [storedValue, setStoredValue] = useState(() => {
                    try {
                        const item = window.localStorage.getItem(key);
                        return item ? JSON.parse(item) : initialValue;
                    } catch (error) { return initialValue; }
                });
                const setValue = (value) => {
                    try {
                        const valueToStore = value instanceof Function ? value(storedValue) : value;
                        setStoredValue(valueToStore);
                        window.localStorage.setItem(key, JSON.stringify(valueToStore));
                    } catch (error) {}
                };
                return [storedValue, setValue];
            };

            const [target, setTarget] = useLocalStorage('fire_target_v3', 6000000); 
            const [currentAge, setCurrentAge] = useLocalStorage('fire_age_v3', 26);
            const [spareCash, setSpareCash] = useLocalStorage('fire_spare_cash_v3', 50000);
            const [ibInvestments, setIbInvestments] = useLocalStorage('fire_ib_investments_v3', 100000);
            
            const initialCapital = ibInvestments;
            
            const outstandingLoan = useMemo(() => {
                let balance = 630513;
                const pmt = 20208.62;
                const monthlyRate = 0.14 / 12;
                for(let i=1; i<=8; i++) {
                    const interest = balance * monthlyRate;
                    balance -= (pmt - interest);
                }
                const oldDebt = 60000; 
                const successFee = 240000; 
                
                const totalExpectedReturn = (pmt * 39) + oldDebt + successFee; 
                const collectedSoFar = pmt * 8; 
                const totalRemainingAll = totalExpectedReturn - collectedSoFar; 
                const expectedProfit = totalExpectedReturn - 630513 - oldDebt; 

                return {
                    mainBalance: balance, oldDebt: oldDebt, totalPrincipal: balance + oldDebt, 
                    totalExpectedReturn: totalExpectedReturn, totalRemainingAll: totalRemainingAll, expectedProfit: expectedProfit
                };
            }, []);

            const netWorthExcludeLoan = spareCash + ibInvestments;
            const netWorthIncludeLoan = netWorthExcludeLoan + outstandingLoan.totalPrincipal;

            const totalIncome = 32210 + 20208 + 10000; 
            const [expenses, setExpenses] = useLocalStorage('fire_expenses_v3', 15000);
            const [mpf, setMpf] = useLocalStorage('fire_mpf_v3', 1500);
            const availableSavings = totalIncome - expenses - mpf;

            const [stage1Duration, setStage1Duration] = useLocalStorage('fire_stage1_dur_v3', 43); 
            const [stage2Duration, setStage2Duration] = useLocalStorage('fire_stage2_dur_v3', 0); 
            const [contributionStage2, setContributionStage2] = useLocalStorage('fire_stage2_cont_v3', 15000); 
            const [contributionStage3, setContributionStage3] = useLocalStorage('fire_stage3_cont_v3', 15000); 

            const [annualReturn, setAnnualReturn] = useLocalStorage('fire_return_v3', 8);
            const [inflationRate, setInflationRate] = useLocalStorage('fire_inflation_v3', 2.5);

            const chartData = useMemo(() => {
                let balance = initialCapital;
                let realBalance = initialCapital;
                let months = 0;
                const monthlyRate = (annualReturn / 100) / 12;
                const data = [];
                
                data.push({ year: 0, age: currentAge, 總資產: balance, 實質購買力: realBalance, 投入本金: initialCapital });

                let totalPrincipal = initialCapital;
                let limit = 0;

                while (realBalance < target * 1.5 && limit < 480) { 
                    limit++;
                    months++;
                    
                    let currentContribution = 0;
                    if (months <= stage1Duration) { currentContribution = availableSavings; } 
                    else if (months <= stage1Duration + stage2Duration) { currentContribution = contributionStage2; } 
                    else { currentContribution = contributionStage3; }

                    const interest = balance * monthlyRate;
                    balance = balance + interest + currentContribution;
                    realBalance = balance / Math.pow(1 + inflationRate/100, months/12);
                    totalPrincipal += currentContribution;

                    if (months % 12 === 0) {
                        data.push({
                            year: months / 12, age: currentAge + (months / 12),
                            總資產: Math.round(balance), 實質購買力: Math.round(realBalance), 投入本金: Math.round(totalPrincipal)
                        });
                    }
                }
                
                const exactTargetIndex = data.findIndex(d => d.實質購買力 >= target);
                return { data, years: exactTargetIndex !== -1 ? data[exactTargetIndex].year : 0 };
            }, [initialCapital, availableSavings, contributionStage2, contributionStage3, stage1Duration, stage2Duration, annualReturn, currentAge, inflationRate, target]);

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-stone-50 dark:bg-[#121212] text-stone-800 dark:text-stone-200 font-sans transition-colors duration-500 selection:bg-sage-200 dark:selection:bg-sage-800 selection:text-stone-900 dark:selection:text-white pb-8">
                        
                        {/* 頂部極簡導航 (適配手機瀏海與安全區域) */}
                        <header className="sticky top-0 z-50 bg-stone-50/90 dark:bg-[#121212]/90 backdrop-blur-xl border-b border-stone-200 dark:border-stone-800/50 transition-colors duration-500 pt-safe">
                            <div className="max-w-7xl mx-auto px-4 md:px-6 h-auto md:h-20 flex flex-col md:flex-row justify-between items-center py-3 md:py-0 gap-3 md:gap-0">
                                <div className="flex items-center justify-between w-full md:w-auto">
                                    <div className="flex flex-col justify-center">
                                        <h1 className="text-lg md:text-base font-bold md:font-semibold tracking-wide flex items-center gap-2">
                                            財務與職涯戰情室
                                        </h1>
                                        <div className="flex items-center gap-1.5 mt-0.5">
                                            <span className="relative flex h-2 w-2">
                                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-sage-400 opacity-75"></span>
                                              <span className="relative inline-flex rounded-full h-2 w-2 bg-sage-500"></span>
                                            </span>
                                            <p className="text-[10px] md:text-xs text-stone-400 dark:text-stone-500 uppercase tracking-widest">2026年7月 即時數據</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="md:ml-12 w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-200 dark:hover:bg-stone-800 transition-all duration-300 active:scale-95 bg-stone-200/50 dark:bg-stone-800/50 md:bg-transparent">
                                        <div className={`w-4 h-4 rounded-full border-2 ${isDarkMode ? 'border-stone-400 bg-transparent' : 'bg-stone-800 border-stone-800'}`}></div>
                                    </button>
                                </div>
                                
                                {/* 手機端橫向滑動導航 */}
                                <div className="flex gap-2 w-full md:w-auto overflow-x-auto hide-scrollbar pb-1 md:pb-0 items-center snap-x snap-mandatory">
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} label="戰情總覽" icon={<Icons.Dashboard/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'salary'} onClick={() => setActiveTab('salary')} label="薪酬階梯" icon={<Icons.TrendingUp/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'loan'} onClick={() => setActiveTab('loan')} label="債務回收" icon={<Icons.Calendar/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'calculator'} onClick={() => setActiveTab('calculator')} label="FIRE 計算機" icon={<Icons.Calculator/>} /></div>
                                </div>
                            </div>
                        </header>

                        {/* Main Content Area */}
                        <main className="max-w-7xl mx-auto px-3 sm:px-4 md:px-6 py-6 md:py-12">
                            <div className="animate-fade-in-up">
                                {activeTab === 'dashboard' && <DashboardTab 
                                    expenses={expenses} setExpenses={setExpenses} mpf={mpf} totalIncome={totalIncome} availableSavings={availableSavings}
                                    fireYears={chartData.years} target={target} spareCash={spareCash} setSpareCash={setSpareCash}
                                    ibInvestments={ibInvestments} setIbInvestments={setIbInvestments} outstandingLoan={outstandingLoan}
                                    netWorthExcludeLoan={netWorthExcludeLoan} netWorthIncludeLoan={netWorthIncludeLoan}
                                />}
                                {activeTab === 'salary' && <SalaryTab />}
                                {activeTab === 'loan' && <LoanTab outstandingLoan={outstandingLoan} />}
                                {activeTab === 'calculator' && <CalculatorTab 
                                    isDark={isDarkMode} currentAge={currentAge} setCurrentAge={setCurrentAge}
                                    initialCapital={initialCapital} stage1Duration={stage1Duration} setStage1Duration={setStage1Duration}
                                    contributionStage2={contributionStage2} setContributionStage2={setContributionStage2}
                                    stage2Duration={stage2Duration} setStage2Duration={setStage2Duration}
                                    contributionStage3={contributionStage3} setContributionStage3={setContributionStage3}
                                    annualReturn={annualReturn} setAnnualReturn={setAnnualReturn}
                                    inflationRate={inflationRate} setInflationRate={setInflationRate}
                                    availableSavings={availableSavings} setExpenses={setExpenses} totalIncome={totalIncome} mpf={mpf}
                                    chartData={chartData} target={target} setTarget={setTarget}
                                    ibInvestments={ibInvestments} setIbInvestments={setIbInvestments}
                                />}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const TabBtn = ({ active, onClick, label, icon }) => (
            <button 
                onClick={onClick} 
                className={`relative px-4 py-2.5 flex items-center gap-2 text-sm font-medium tracking-wide rounded-lg transition-all duration-300 whitespace-nowrap
                ${active ? 'bg-stone-200 dark:bg-stone-800 text-stone-900 dark:text-stone-100 shadow-sm' : 'text-stone-500 hover:text-stone-800 dark:hover:text-stone-200 hover:bg-stone-100 dark:hover:bg-stone-800/50'}`}
            >
                <span className={`${active ? 'text-sage-600 dark:text-sage-400' : 'opacity-70'}`}>{icon}</span>
                {label}
            </button>
        );

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white/70 dark:bg-[#181818]/90 backdrop-blur-sm border border-stone-200/80 dark:border-stone-800/80 rounded-2xl p-5 md:p-8 smooth-transition hover:shadow-lg hover:shadow-stone-200/40 dark:hover:shadow-black/40 hover:-translate-y-0.5 ${className}`}>
                {children}
            </div>
        );

        const SectionTitle = ({ title, subtitle }) => (
            <div className="mb-6 md:mb-8 flex flex-col md:flex-row md:items-baseline gap-1 md:gap-3">
                <h2 className="text-xl font-semibold text-stone-900 dark:text-stone-100">{title}</h2>
                {subtitle && <p className="text-xs text-stone-500 uppercase tracking-widest">{subtitle}</p>}
            </div>
        );

        const InlineInput = ({ value, onChange, prefix = '', colorClass = 'focus:ring-stone-500/30 dark:focus:ring-stone-400/30 focus:border-stone-500', widthClass = 'w-24 md:w-32' }) => (
            <div className="relative flex items-center group">
                {prefix && <span className="text-stone-500 absolute left-3 text-sm z-10 font-medium">{prefix}</span>}
                <input 
                    type="number" value={value} onChange={onChange}
                    className={`${widthClass} bg-stone-100/80 dark:bg-stone-800/50 border border-transparent hover:border-stone-300 dark:hover:border-stone-600 ${colorClass} focus:ring-4 rounded-lg text-right outline-none transition-all duration-300 font-semibold text-stone-900 dark:text-stone-100 py-2 pr-3 ${prefix ? 'pl-8' : 'pl-3'} shadow-inner shadow-stone-200/20 dark:shadow-black/20 text-sm md:text-base`}
                />
                <div className="absolute -right-6 opacity-0 md:group-hover:opacity-100 transition-opacity duration-300 pointer-events-none hidden md:block">
                    <Icons.Edit />
                </div>
            </div>
        );

        const CalcInput = ({ label, value, onChange, prefix, postfix, hint }) => (
            <div className="space-y-1.5 w-full">
                <label className="text-[11px] font-bold text-stone-500 tracking-widest uppercase flex flex-col md:flex-row md:justify-between md:items-center gap-1 md:gap-0">
                    <span>{label}</span>
                    {hint && <span className="text-[10px] text-sage-500 dark:text-sage-400 tracking-normal normal-case">{hint}</span>}
                </label>
                <div className="flex items-center bg-stone-50 dark:bg-stone-800/30 border border-stone-200/80 dark:border-stone-700/80 rounded-lg px-3 py-2.5 focus-within:border-sage-500 focus-within:ring-1 focus-within:ring-sage-500 smooth-transition">
                    {prefix && <span className="text-stone-400 dark:text-stone-500 mr-2 text-sm">{prefix}</span>}
                    <input type="number" value={value} onChange={onChange} className="w-full bg-transparent outline-none font-semibold text-stone-900 dark:text-stone-100" />
                    {postfix && <span className="text-stone-400 dark:text-stone-500 ml-2 text-sm">{postfix}</span>}
                </div>
            </div>
        );

        function DashboardTab({ expenses, setExpenses, mpf, totalIncome, availableSavings, fireYears, target, spareCash, setSpareCash, ibInvestments, setIbInvestments, outstandingLoan, netWorthExcludeLoan, netWorthIncludeLoan }) {
            const expensePct = Math.max(0, (expenses / totalIncome) * 100);
            const mpfPct = Math.max(0, (mpf / totalIncome) * 100);
            const savingPct = Math.max(0, (availableSavings / totalIncome) * 100);

            return (
                <div className="space-y-6 md:space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <Card className="flex flex-col justify-center">
                            <p className="text-xs text-stone-500 tracking-widest mb-1 flex items-center gap-1"><Icons.TrendingUp/> 距離實質達標</p>
                            <div className="text-4xl md:text-5xl font-bold text-stone-900 dark:text-stone-100 mt-2">{fireYears > 0 ? fireYears : '—'}<span className="text-lg md:text-xl ml-1 text-stone-400 font-normal">年</span></div>
                        </Card>
                        <Card className="flex flex-col justify-center border-b-4 border-b-sage-500 dark:border-b-sage-400">
                            <p className="text-xs text-stone-500 tracking-widest mb-1 flex items-center gap-1"><Icons.Dashboard/> 流動淨資產</p>
                            <div className="text-4xl md:text-5xl font-bold text-sage-600 dark:text-sage-400 mt-2"><span className="text-2xl md:text-3xl mr-1 opacity-70">$</span>{netWorthExcludeLoan.toLocaleString()}</div>
                        </Card>
                        <Card className="flex flex-col justify-center">
                            <p className="text-xs text-stone-500 tracking-widest mb-1 flex items-center gap-1"><Icons.Calendar/> 目前薪級點 (Pt.7)</p>
                            <div className="text-4xl md:text-5xl font-bold text-stone-900 dark:text-stone-100 mt-2">~$32.2<span className="text-lg md:text-xl ml-1 text-stone-400 font-normal">K</span></div>
                        </Card>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                        <div className="space-y-6 md:space-y-8">
                            <Card>
                                <SectionTitle title="資產配置" subtitle="Net Worth" />
                                <div className="space-y-4 md:space-y-5">
                                    <div className="flex justify-between items-center p-3 md:p-4 rounded-xl hover:bg-stone-100 dark:hover:bg-stone-800/50 smooth-transition">
                                        <div className="flex flex-col">
                                            <span className="text-sm md:text-base font-semibold text-stone-800 dark:text-stone-200">備用現金</span>

                                {/* 階段里程碑 (適配手機雙欄排版) */}
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                                    {[1000000, 2000000, 3000000, 6000000].map((milestone) => {
                                        const mData = chartData.data.find(d => d.實質購買力 >= milestone);
                                        return (
                                            <div key={milestone} className="bg-stone-50 dark:bg-stone-800/30 p-3 md:p-4 rounded-xl border border-stone-200/50 dark:border-stone-700/50 text-center flex flex-col justify-center hover:border-stone-300 dark:hover:border-stone-600 smooth-transition cursor-default">
                                                <div className="text-[10px] md:text-[11px] text-stone-500 dark:text-stone-400 mb-1.5 font-medium tracking-widest">{milestone / 10000}萬 實質進度</div>
                                                {mData ? (
                                                    <>
                                                        <div className="font-bold text-lg md:text-xl text-stone-900 dark:text-stone-100">{mData.age} 歲</div>
                                                        <div className="text-[9px] md:text-[10px] text-stone-500 mt-1 uppercase tracking-wider">第 {mData.year} 年</div>
                                                    </>
                                                ) : (
                                                    <div className="font-bold text-lg md:text-xl text-stone-300 dark:text-stone-700">—</div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {/* 終極目標與被動收入 (適配手機直立佈局) */}
                                <div className="p-5 md:p-8 rounded-xl border border-sage-200 dark:border-sage-800/50 bg-sage-50/50 dark:bg-sage-900/10 shadow-sm relative overflow-hidden flex flex-col sm:flex-row items-center justify-between gap-6 sm:gap-4 md:gap-6 hover:shadow-md smooth-transition">
                                    <div className="absolute top-0 right-0 w-24 md:w-32 h-24 md:h-32 bg-sage-200/40 dark:bg-sage-800/30 rounded-bl-full -mr-12 md:-mr-16 -mt-12 md:-mt-16 pointer-events-none"></div>
                                    <div className="absolute bottom-0 left-0 w-16 md:w-24 h-16 md:h-24 bg-sage-200/30 dark:bg-sage-800/20 rounded-tr-full -ml-8 md:-ml-12 -mb-8 md:-mb-12 pointer-events-none"></div>
                                    
                                    <div className="flex-1 z-10 w-full text-center sm:text-left">
                                        <p className="text-[10px] md:text-xs text-stone-500 dark:text-stone-400 tracking-widest mb-1.5 md:mb-2 font-bold uppercase">達標 {(target/10000)}萬(實質) 需時</p>
                                        <div className="text-4xl md:text-5xl font-black text-sage-600 dark:text-sage-400 my-1 md:my-2">{chartData.years > 0 ? chartData.years : '—'}<span className="text-lg md:text-xl ml-2 text-sage-500/70 font-normal">年</span></div>
                                        <p className="text-[10px] md:text-xs text-stone-500">預計達成年齡: <strong className="text-stone-700 dark:text-stone-300 text-sm md:text-base ml-1">{currentAge + chartData.years} 歲</strong></p>
                                    </div>

                                    {/* 分隔線 (桌面直立，手機橫向) */}
                                    <div className="hidden sm:block w-px h-16 md:h-24 bg-sage-200/80 dark:bg-sage-800/80 z-10"></div>
                                    <div className="sm:hidden h-px w-full bg-sage-200/80 dark:bg-sage-800/80 z-10"></div>

                                    <div className="flex-1 z-10 w-full text-center sm:text-left">
                                        <p className="text-[10px] md:text-xs text-stone-500 dark:text-stone-400 tracking-widest mb-1.5 md:mb-2 font-bold uppercase">達標後 4% 被動收入</p>
                                        <div className="text-3xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-sage-600 dark:text-sage-400 my-1 md:my-2"><span className="text-lg sm:text-base md:text-lg lg:text-xl mr-1 opacity-60 font-normal">HKD</span>{Math.round((target * 0.04) / 12).toLocaleString()} <span className="text-sm md:text-base font-normal opacity-80">/ 月</span></div>
                                        <p className="text-[9px] md:text-[11px] text-sage-600/70 dark:text-sage-500 mt-1 md:mt-2">基於實質購買力計算，具備抗通脹能力</p>
                                    </div>
                                </div>
                            </div>

                        </Card>
                    </div>
                </div>
            );
        }

        function SalaryTab() {
            const points = [
                { pt: 17, salary: '43,240', note: '警員/高級警員頂薪點 (第8年) - 預計 2032-09-23 達成' },
                { pt: 16, salary: '42,050', note: '常規跳點 (第7年) - 預計 2031-09-23 達成' },
                { pt: 15, salary: '40,805', note: '常規跳點 (第6年) - 預計 2030-09-23 達成' },
                { pt: 14, salary: '39,725', note: '完成第五年服務並通過升級試 (+2點) - 預計 2029-09-23 達成' },
                { pt: 13, salary: '38,580', note: '跳過 (與Pt.14合併晉升)' },
                { pt: 12, salary: '37,495', note: '完成第四年服務 - 預計 2028-09-23 達成' },
                { pt: 11, salary: '36,605', note: '完成第三年服務 (+2點) - 預計 2027-09-23 達成' },
                { pt: 10, salary: '35,370', note: '' },
                { pt: 9, salary: '34,305', note: '完成第二年服務 (+2點) - 預計 2026-09-23 達成' },
                { pt: 8, salary: '32,805', note: '' },
                { pt: 7, salary: '32,210', note: '完成首年服務 (+2點) - 當前狀態 (2025-09-23 達成)' },
                { pt: 6, salary: '30,700', note: '' },
                { pt: 5, salary: '29,805', note: '警察學院畢業 (+1點) - 2025-03-24' },
                { pt: 4, salary: '28,940', note: '入職起薪 - 2024-09-23' },
            ];

            const activeRowClass = "bg-stone-200/60 dark:bg-stone-800/60 text-stone-900 dark:text-stone-100 shadow-sm font-medium";
            const inactiveRowClass = "text-stone-600 dark:text-stone-400 hover:bg-stone-50 dark:hover:bg-stone-800/40";

            return (
                <div className="animate-fade-in-up">
                    <SectionTitle title="薪酬階梯" subtitle="Point System (Pt 4-17)" />
                    <Card className="p-0 overflow-hidden">
                        <div className="overflow-x-auto hide-scrollbar rounded-xl">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="text-[10px] md:text-[11px] font-semibold tracking-widest text-stone-500 bg-stone-50 dark:bg-stone-900/50 border-b border-stone-200 dark:border-stone-800 sticky top-0 z-10 shadow-sm">
                                    <tr>
                                        <th className="py-3 md:py-4 px-4 md:px-6">薪級點</th>
                                        <th className="py-3 md:py-4 px-4 md:px-6 text-right">月薪 (HKD)</th>
                                        <th className="py-3 md:py-4 px-4 md:px-6 pl-8 md:pl-12 hidden md:table-cell">晉升條件與預測時間</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-stone-100 dark:divide-stone-800/60">
                                    {points.map((p) => {
                                        const isFocus = p.pt === 7;
                                        return (
                                            <tr key={p.pt} className={`group smooth-transition cursor-default ${isFocus ? activeRowClass : inactiveRowClass}`}>
                                                <td className="py-3 md:py-4 px-4 md:px-6 font-semibold flex items-center gap-2 md:gap-3">
                                                    {isFocus ? <div className="w-2 h-2 rounded-full bg-stone-600 dark:bg-stone-400 shadow-[0_0_8px_rgba(168,164,156,0.5)]"></div> : <div className="w-2 h-2"></div>}
                                                    Pt. {p.pt}
                                                </td>
                                                <td className="py-3 md:py-4 px-4 md:px-6 text-right font-bold tracking-wide">${p.salary}</td>
                                                <td className={`py-3 md:py-4 px-4 md:px-6 pl-8 md:pl-12 text-xs hidden md:table-cell smooth-transition ${isFocus ? 'opacity-100' : 'opacity-70 group-hover:opacity-100'}`}>{p.note}</td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        }

        function LoanTab({ outstandingLoan }) {
            const schedule = useMemo(() => {
                let balance = 630513;
                const data = [];
                const startDate = new Date(2025, 10, 29); 
                for (let i = 1; i <= 39; i++) {
                    const interest = balance * (0.14 / 12);
                    const principal = 20208.62 - interest;
                    balance = Math.max(0, balance - principal);
                    const d = new Date(startDate);
                    d.setMonth(d.getMonth() + (i - 1));
                    
                    data.push({
                        period: i, date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`,
                        pmt: 20208.62, oldDebt: (i >= 9 && i <= 14) ? 10000 : 0, principal, interest, balance,
                        status: i <= 8 ? 'paid' : (i === 9 ? 'current' : 'future')
                    });
                }
                for(let i = 40; i <= 51; i++) {
                    const d = new Date(startDate);
                    d.setMonth(d.getMonth() + (i - 1));
                    data.push({ period: i, date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`, pmt: 20000, oldDebt: 0, principal: 0, interest: 0, balance: 0, status: 'success_fee' });
                }
                return data;
            }, []);

            const activeRowClass = "bg-stone-200/60 dark:bg-stone-800/60 text-stone-900 dark:text-stone-100 shadow-sm font-medium";
            const inactiveRowClass = "text-stone-600 dark:text-stone-400 hover:bg-stone-50 dark:hover:bg-stone-800/40";
            const fadedRowClass = "text-stone-400 dark:text-stone-600 hover:bg-stone-50 dark:hover:bg-stone-800/40";

            return (
                <div className="animate-fade-in-up space-y-6 md:space-y-8">
                    <div>
                        <SectionTitle title="債務總覽" subtitle="Debt Overview" />
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                            <Card className="flex flex-col justify-center border-l-4 border-l-stone-800 dark:border-l-stone-200 p-5 md:p-8">
                                <p className="text-xs text-stone-500 tracking-widest mb-1 font-medium">合約預期總額</p>
                                <div className="text-3xl md:text-4xl font-bold text-stone-900 dark:text-stone-100 mt-1"><span className="text-xl md:text-2xl mr-1 opacity-60">$</span>{Math.round(outstandingLoan.totalExpectedReturn).toLocaleString()}</div>
                            </Card>
                            <Card className="flex flex-col justify-center border-l-4 border-l-sage-500 p-5 md:p-8">
                                <p className="text-xs text-stone-500 tracking-widest mb-1 font-medium">合約預期純利</p>
                                <div className="text-3xl md:text-4xl font-bold text-sage-600 dark:text-sage-400 mt-1"><span className="text-xl md:text-2xl mr-1 opacity-60">$</span>{Math.round(outstandingLoan.expectedProfit).toLocaleString()}</div>
                            </Card>
                            <Card className="flex flex-col justify-center border-l-4 border-l-clay-500 p-5 md:p-8">
                                <p className="text-xs text-stone-500 tracking-widest mb-1 font-medium">尚未收回總額</p>
                                <div className="text-3xl md:text-4xl font-bold text-clay-600 dark:text-clay-400 mt-1"><span className="text-xl md:text-2xl mr-1 opacity-60">$</span>{Math.round(outstandingLoan.totalRemainingAll).toLocaleString()}</div>
                            </Card>
                        </div>
                    </div>

                    <div>
                        <SectionTitle title="債務回收矩陣" subtitle="Amortization Schedule (等額本息)" />
                        <Card className="p-0 overflow-hidden">
                            <div className="overflow-x-auto max-h-[500px] md:max-h-[600px] hide-scrollbar rounded-xl">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="text-[10px] md:text-[11px] font-semibold tracking-widest text-stone-500 bg-stone-50 dark:bg-stone-900/50 border-b border-stone-200 dark:border-stone-800 sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="py-3 md:py-4 px-4 md:px-6">期數</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6">日期</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6 text-right">常規供款</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6 text-right text-dusty-500">舊債/成功費</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6 text-right text-stone-900 dark:text-stone-100">當月總收</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6 text-right text-clay-500">利息部分</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6 text-right text-sage-500">本金部分</th>
                                            <th className="py-3 md:py-4 px-3 md:px-6 text-right">剩餘主本金</th>
                                            <th className="py-3 md:py-4 px-4 md:px-6 text-center">狀態</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100 dark:divide-stone-800/60 text-xs md:text-sm">
                                        {schedule.map((row) => {
                                            const isFocus = row.status === 'current';
                                            const isFaded = row.status === 'paid';
                                            return (
                                                <tr key={row.period} className={`group smooth-transition cursor-default ${isFocus ? activeRowClass : (isFaded ? fadedRowClass : inactiveRowClass)}`}>
                                                    <td className="py-3 md:py-4 px-4 md:px-6 font-medium flex items-center gap-2 md:gap-3">
                                                        {isFocus ? <div className="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-stone-600 dark:bg-stone-400 shadow-[0_0_8px_rgba(168,164,156,0.5)]"></div> : <div className="w-1.5 h-1.5 md:w-2 md:h-2"></div>}
                                                        {row.status === 'success_fee' ? `SF ${row.period-39}` : row.period}
                                                    </td>
                                                    <td className="py-3 md:py-4 px-3 md:px-6 font-mono text-[10px] md:text-xs">{row.date}</td>
                                                    <td className="py-3 md:py-4 px-3 md:px-6 text-right">${row.status === 'success_fee' ? '0.00' : row.pmt.toFixed(2)}</td>
                                                    <td className="py-3 md:py-4 px-3 md:px-6 text-right font-medium text-dusty-500 dark:text-dusty-600/80">{row.oldDebt > 0 ? `+${row.oldDebt.toFixed(2)}` : (row.status === 'success_fee' ? row.pmt.toFixed(2) : '—')}</td>
                                                    <td className={`py-3 md:py-4 px-3 md:px-6 text-right font-bold ${isFaded ? '' : (isFocus ? 'text-stone-900 dark:text-stone-100' : 'text-stone-800 dark:text-stone-200')}`}>${(row.status === 'success_fee' ? row.pmt : row.pmt + row.oldDebt).toFixed(2)}</td>
                                                    <td className={`py-3 md:py-4 px-3 md:px-6 text-right ${isFaded ? '' : 'text-clay-500 dark:text-clay-600'}`}>{row.interest > 0 ? row.interest.toFixed(2) : '—'}</td>
                                                    <td className={`py-3 md:py-4 px-3 md:px-6 text-right ${isFaded ? '' : 'text-sage-500 dark:text-sage-600'}`}>{row.principal > 0 ? row.principal.toFixed(2) : '—'}</td>
                                                    <td className="py-3 md:py-4 px-3 md:px-6 text-right font-mono text-[10px] md:text-xs">{row.balance > 0 ? row.balance.toFixed(2) : '—'}</td>
                                                    <td className="py-3 md:py-4 px-4 md:px-6 text-center text-[9px] md:text-[10px] tracking-widest uppercase">
                                                        {row.status === 'paid' && <span className="px-1.5 md:px-2 py-0.5 md:py-1 bg-stone-100 dark:bg-stone-800 rounded-md">已付</span>}
                                                        {row.status === 'current' && <span className="px-1.5 md:px-2 py-0.5 md:py-1 bg-stone-700 text-white dark:bg-stone-200 dark:text-stone-900 rounded-md font-bold shadow-sm">本月</span>}
                                                        {row.status === 'future' && <span className="px-1.5 md:px-2 py-0.5 md:py-1 border border-stone-200 dark:border-stone-700 rounded-md">未到期</span>}
                                                        {row.status === 'success_fee' && <span className="px-1.5 md:px-2 py-0.5 md:py-1 bg-clay-50 dark:bg-clay-900/20 text-clay-600 dark:text-clay-500 rounded-md">報酬期</span>}
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
