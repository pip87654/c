        const calculateXIRR = (cashFlows) => {
            const validFlows = cashFlows
                .filter(cf => cf.date && !isNaN(Number(cf.amount)) && Number(cf.amount) !== 0)
                .map(cf => ({ date: new Date(cf.date), amount: Number(cf.amount) }))
                .sort((a, b) => a.date - b.date);

            if (validFlows.length < 2) return null;

            const hasPositive = validFlows.some(cf => cf.amount > 0);
            const hasNegative = validFlows.some(cf => cf.amount < 0);
            if (!hasPositive || !hasNegative) return null; 

            const t0 = validFlows[0].date.getTime();
            const days = validFlows.map(cf => (cf.date.getTime() - t0) / (1000 * 3600 * 24));
            const amounts = validFlows.map(cf => cf.amount);

            const xnpv = (rate) => amounts.reduce((sum, amount, i) => sum + amount / Math.pow(1 + rate, days[i] / 365), 0);
            const xnpvDerivative = (rate) => amounts.reduce((sum, amount, i) => {
                if (days[i] === 0) return sum;
                return sum - (amount * (days[i] / 365)) / Math.pow(1 + rate, (days[i] / 365) + 1);
            }, 0);

            const guesses = [0.1, -0.1, 0.5, -0.5, 1.0];
            const maxIters = 100;
            const tolerance = 1e-6;

            for (let guess of guesses) {
                let rate = guess;
                let success = true;
                for (let i = 0; i < maxIters; i++) {
                    const fValue = xnpv(rate);
                    const fDerivative = xnpvDerivative(rate);
                    if (Math.abs(fDerivative) < 1e-10) { success = false; break; }
                    const newRate = rate - fValue / fDerivative;
                    if (Math.abs(newRate - rate) < tolerance) { return newRate; }
                    rate = newRate;
                }
            }
            return null; 
        };

                    else { currentContribution = num(contributionStage3); }

                    const interest = balance * monthlyRate;
                    balance = balance + interest + currentContribution;
                    realBalance = balance / Math.pow(1 + numInflation/100, months/12);
                    totalPrincipal += currentContribution;

                    let currentY = baseYear + Math.floor((baseMonth - 1 + months) / 12);
                    let currentM = ((baseMonth - 1 + months) % 12) + 1;
                    let ageY = Math.floor(num(currentAge) + months / 12);
                    let ageM = months % 12;

                    data.push({
                        monthsElapsed: months,
                        yearStr: `${currentY}年${currentM}月`,
                        ageStr: `${ageY}歲${ageM > 0 ? ageM + '個月' : ''}`,
                        age: ageY,
                        總資產: Math.round(balance), 
                        實質購買力: Math.round(realBalance), 
                        投入本金: Math.round(totalPrincipal)
                    });
                }
                
                const exactTargetData = data.find(d => d.實質購買力 >= safeTarget);
                
                return { 
                    data, 
                    targetHit: exactTargetData || null 
                };
            }, [initialCapital, availableSavings, contributionStage2, contributionStage3, autoStage1Months, autoStage2Months, annualReturn, currentAge, inflationRate, target]);

        function RebalanceTab({ rawNewMoney, setRawNewMoney, tickers, setTickers }) {
            const [isOcrProcessing, setIsOcrProcessing] = useState(false);
            const [ocrProgress, setOcrProgress] = useState('');
            const fileInputRef = useRef(null);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsOcrProcessing(true);
                setOcrProgress('啟動視覺引擎...');

                try {
                    if (!window.Tesseract) {
                        alert("OCR 視覺引擎尚未載入完畢，請確認網路連線。");
                        setIsOcrProcessing(false);
                        return;
                    }

                    const { data: { text } } = await window.Tesseract.recognize(
                        file,
                        'eng+chi_tra',
                        {
                            logger: m => {
                                if (m.status === 'recognizing text') {
                                    setOcrProgress(`分析截圖中... ${Math.round(m.progress * 100)}%`);
                                } else if (m.status.includes('loading') || m.status.includes('downloading') || m.status.includes('fetching')) {
                                    setOcrProgress(`下載語言包 (首次較久)... ${Math.round((m.progress || 0) * 100)}%`);
                                } else {
                                    setOcrProgress('初始化 AI 模型...');
                                }
                            }
                        }
                    );

                    setOcrProgress('資料匹配中...');

                    let parsedNewMoney = rawNewMoney;
                    const cashMatch = text.match(/(?:總計現金|總\s*計\s*現\s*金|現金餘額|總計|Total\s*Cash)[^\d]*?([\d,]+\.\d{2})/i);
                    if (cashMatch) {
                        const cashVal = parseFloat(cashMatch[1].replace(/,/g, ''));
                        if (!isNaN(cashVal)) parsedNewMoney = cashVal;
                    }

                    const newTickers = [...tickers];
                    newTickers.forEach((t, idx) => {
                        const tickerRegex = new RegExp(t.symbol + '[^\\d]*?([\\d,]+(?:\\.\\d{2})?)', 'i');
                        const tMatch = text.match(tickerRegex);
                        if (tMatch) {
                            const val = parseFloat(tMatch[1].replace(/,/g, ''));
                            if (!isNaN(val)) {
                                newTickers[idx].currentVal = val;
                            }
                        }
                    });

                    setTickers(newTickers);
                    setRawNewMoney(parsedNewMoney);
                    
                    setOcrProgress('讀取並填寫完成！');
                    setTimeout(() => setIsOcrProcessing(false), 2000);

                } catch (error) {
                    console.error(error);
                    setOcrProgress('影像無法辨識，請手動輸入');
                    setTimeout(() => setIsOcrProcessing(false), 3000);
                }
                
                if(fileInputRef.current) fileInputRef.current.value = '';
            };

            const actualNewMoney = num(rawNewMoney) / 1.01; 
            const totalCurrent = tickers.reduce((sum, t) => sum + num(t.currentVal), 0);
            const targetTotal = totalCurrent + actualNewMoney;

            const rows = tickers.map(t => {
                const targetValue = targetTotal * (t.targetPct / 100);
                const gap = targetValue - num(t.currentVal);
                return { ...t, targetValue, gap };
            });

            const positiveGaps = rows.map(r => Math.max(0, r.gap));
            const sumPositiveGaps = positiveGaps.reduce((sum, g) => sum + g, 0);

            const finalRows = rows.map((r, i) => {
                const gapPct = sumPositiveGaps > 0 ? positiveGaps[i] / sumPositiveGaps : 0;
                const buyAmount = Math.round(actualNewMoney * gapPct);
                return { ...r, gapPct, buyAmount };
            });

            const handleCurrentValChange = (index, val) => {

                newTickers[index].currentVal = val === '' ? '' : Number(val);
                setTickers(newTickers);

                            <label className="text-[10px] md:text-xs text-amber-800 dark:text-amber-500 font-bold uppercase tracking-widest mb-2 block">1. 準備投入新資金 (USD)</label>
                            <div className="flex items-center bg-white dark:bg-[#121212] border border-amber-200 dark:border-amber-700/50 rounded-xl px-4 py-3 focus-within:border-amber-500 focus-within:ring-1 focus-within:ring-amber-500 smooth-transition shadow-sm">
                                <span className="text-stone-400 mr-2 font-medium">$</span>

                        <Card className="p-4 md:p-6 flex flex-col justify-center">

                            <div className="text-3xl font-black text-stone-900 dark:text-stone-100 mt-1">

                    <Card className="p-0 overflow-hidden">

                                <thead className="text-[10px] md:text-[11px] font-semibold tracking-widest text-stone-500 bg-stone-100/50 dark:bg-stone-900/50 border-b border-stone-200 dark:border-stone-800">

                                        <th className="py-3 px-4 text-right">目標總值</th>
                                        <th className="py-3 px-4 text-right">缺口佔比</th>
                                        <th className="py-3 px-4 text-right bg-sky-100/60 dark:bg-sky-900/30 text-sky-900 dark:text-sky-200">本月應買入(USD)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-stone-100 dark:divide-stone-800/60 text-xs md:text-sm font-mono">
                                    {finalRows.map((row, idx) => (
                                        <tr key={row.symbol} className="hover:bg-stone-50 dark:hover:bg-stone-800/40 smooth-transition">
                                            <td className="py-2.5 px-4 font-bold font-sans text-stone-900 dark:text-stone-100">{row.symbol}</td>
                                            <td className="py-2.5 px-4 text-right text-stone-600 dark:text-stone-400">{row.targetPct.toFixed(2)}%</td>
                                            
                                            <td className="py-2 px-2 bg-amber-50/40 dark:bg-amber-900/20">
                                                <div className="relative flex items-center bg-white dark:bg-[#121212] border border-amber-200 dark:border-amber-700/50 rounded flex-1 focus-within:border-amber-500 smooth-transition max-w-[120px] ml-auto">
                                                    <input 
                                                        type="number" 
                                                        value={row.currentVal} 
                                                        onChange={(e) => handleCurrentValChange(idx, e.target.value)}
                                                        className="w-full bg-transparent outline-none py-1.5 px-2 text-right font-bold text-amber-900 dark:text-amber-400"
                                                    />
                                                </div>
                                            </td>

                                            <td className="py-2.5 px-4 text-right text-stone-600 dark:text-stone-400">{row.targetValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                            <td className="py-2.5 px-4 text-right text-stone-600 dark:text-stone-400">{(row.gapPct).toLocaleString(undefined, {minimumFractionDigits: 6, maximumFractionDigits: 6})}</td>

                                                {row.buyAmount.toLocaleString()}

                                    <tr className="bg-stone-50 dark:bg-stone-800/50 font-bold border-t border-stone-200 dark:border-stone-700">

                                        </td>
                                    </tr>

                            </table>

        function XirrTab({ records, setRecords }) {
            const [showAddForm, setShowAddForm] = useState(false);
            const [addDate, setAddDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [addAmount, setAddAmount] = useState('');

            const stats = useMemo(() => {
                let totalInvested = 0;
                let historicalReturned = 0;

                const positiveRecords = records.filter(r => Number(r.amount) > 0 && r.date)
                                               .sort((a, b) => new Date(b.date) - new Date(a.date));
                const latestPositiveId = positiveRecords.length > 0 ? positiveRecords[0].id : null;
                const currentMarketValue = positiveRecords.length > 0 ? Number(positiveRecords[0].amount) : 0;

                records.forEach(r => {
                    const amt = Number(r.amount);
                    if (!isNaN(amt)) {
                        if (amt < 0) totalInvested += Math.abs(amt);
                        else if (amt > 0 && r.id !== latestPositiveId) historicalReturned += amt;
                    }
                });

                const profit = (historicalReturned + currentMarketValue) - totalInvested;
                const roi = totalInvested > 0 ? (profit / totalInvested) * 100 : 0;
                
                const rawXirr = calculateXIRR(records);
                const xirrPercent = rawXirr !== null ? (rawXirr * 100).toFixed(2) : null;

                return { totalInvested, historicalReturned, currentMarketValue, profit, roi, xirrPercent };
            }, [records]);

            const confirmAdd = () => {
                if (!addDate || addAmount === '') return;
                const newRecord = {
                    id: Date.now().toString(),
                    date: addDate,
                    amount: addAmount
                };
                setRecords([...records, newRecord]);
                setAddAmount('');
                setShowAddForm(false);
            };

            const handleUpdate = (id, field, value) => {
                setRecords(records.map(r => r.id === id ? { ...r, [field]: value } : r));
            };

            const handleDelete = (id) => {
                setRecords(records.filter(r => r.id !== id));
            };

            const sortedRecords = [...records].sort((a, b) => {
                if (!a.date) return 1;
                if (!b.date) return -1;
                return new Date(b.date) - new Date(a.date);
            });

                                    <div className="flex items-center bg-stone-100/50 dark:bg-stone-800/30 border border-transparent rounded-lg px-3 py-2.5 cursor-not-allowed h-10 md:h-[42px]">
                                        <span className="text-stone-400 dark:text-stone-500 mr-2 text-sm">$</span>
                                        <div className="w-full font-semibold text-sage-600 dark:text-sage-400 opacity-90 truncate">
                                            {latestMarketValue.toLocaleString()}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <div className="p-3 md:p-4 bg-stone-50 dark:bg-stone-800/30 border border-stone-200/50 dark:border-stone-700/50 rounded-lg">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[11px] font-bold text-stone-500 uppercase tracking-widest">一階：舊債併行期</span>
                                        <span className="text-[10px] text-sage-500 dark:text-sage-400 flex items-center gap-1"><Icons.Calendar/> 債務連動</span>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                        <div className="flex-1 flex items-center bg-stone-200/40 dark:bg-stone-800/60 border border-transparent rounded px-2 py-2 cursor-not-allowed">
                                            <span className="w-full text-center font-bold text-sm text-stone-500 dark:text-stone-400">{autoStage1Months}</span>
                                            <span className="text-[10px] text-stone-500/70 ml-1 shrink-0">個月</span>
                                        </div>
                                        <div className="flex-[1.5] flex items-center bg-white dark:bg-[#121212] border border-stone-200 dark:border-stone-700 rounded px-2 py-2 focus-within:border-sage-500 smooth-transition">
                                            <span className="text-[10px] text-stone-400 mr-1 shrink-0">投入</span>
                                            <input type="number" value={localStage1} onChange={e=>handleStage1Change(e.target.value)} placeholder="0" className="w-full bg-transparent outline-none text-right font-medium text-sm text-dusty-600 dark:text-dusty-400 placeholder-stone-400/50" />
                                        </div>
                                    </div>
                                </div>
                                <div className="p-3 md:p-4 bg-stone-50 dark:bg-stone-800/30 border border-stone-200/50 dark:border-stone-700/50 rounded-lg">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[11px] font-bold text-stone-500 uppercase tracking-widest">二階：常規還款+成功費期</span>
                                        <span className="text-[10px] text-sage-500 dark:text-sage-400 flex items-center gap-1"><Icons.Calendar/> 債務連動</span>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                        <div className="flex-1 flex items-center bg-stone-200/40 dark:bg-stone-800/60 border border-transparent rounded px-2 py-2 cursor-not-allowed">
                                            <span className="w-full text-center font-bold text-sm text-stone-500 dark:text-stone-400">{autoStage2Months}</span>
                                            <span className="text-[10px] text-stone-500/70 ml-1 shrink-0">個月</span>
                                        </div>
                                        <div className="flex-[1.5] flex items-center bg-white dark:bg-[#121212] border border-stone-200 dark:border-stone-700 rounded px-2 py-2 focus-within:border-sage-500 smooth-transition">
                                            <span className="text-[10px] text-stone-400 mr-1 shrink-0">投入</span>
                                            <input type="number" value={contributionStage2} onChange={e=>setContributionStage2(e.target.value === '' ? '' : Number(e.target.value))} placeholder="0" className="w-full bg-transparent outline-none text-right font-medium text-sm text-stone-900 dark:text-stone-100 placeholder-stone-400/50" />
                                        </div>
                                    </div>
                                </div>
                                <div className="p-3 md:p-4 bg-stone-50 dark:bg-stone-800/30 border border-stone-200/50 dark:border-stone-700/50 rounded-lg">
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[11px] font-bold text-stone-500 uppercase tracking-widest">三階：債務全清後 (純儲蓄)</span>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                        <div className="flex-1 flex items-center justify-center bg-transparent px-2 py-2">
                                            <span className="text-xs text-stone-500 w-full text-center">餘下歲月</span>
                                        </div>
                                        <div className="flex-[1.5] flex items-center bg-white dark:bg-[#121212] border border-stone-200 dark:border-stone-700 rounded px-2 py-2 focus-within:border-sage-500 smooth-transition">
                                            <span className="text-[10px] text-stone-400 mr-1 shrink-0">投入</span>
                                            <input type="number" value={contributionStage3} onChange={e=>setContributionStage3(e.target.value === '' ? '' : Number(e.target.value))} placeholder="0" className="w-full bg-transparent outline-none text-right font-medium text-sm text-stone-900 dark:text-stone-100 placeholder-stone-400/50" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-4 border-t border-stone-200 dark:border-stone-800">
                                <div>
                                    <label className="text-[11px] text-stone-500 tracking-widest mb-3 font-bold uppercase flex justify-between items-center">
                                        年化報酬率 (XIRR)
                                    </label>
                                    <div className="flex flex-col gap-3">
                                        <div className="bg-stone-100 dark:bg-stone-800/50 rounded-md px-3 py-2 border border-stone-200 dark:border-stone-700 text-sage-600 dark:text-sage-400 font-bold text-center">
                                            {annualReturn} %
                                        </div>
                                        <input type="range" min="1" max="15" step="0.5" value={num(annualReturn)} onChange={(e) => setAnnualReturn(Number(e.target.value))} className="w-full accent-sage" />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[11px] text-stone-500 tracking-widest mb-3 font-bold uppercase flex justify-between items-center">
                                        通脹率 (Inflation)
                                    </label>
                                    <div className="flex flex-col gap-3">
                                        <div className="bg-stone-100 dark:bg-stone-800/50 rounded-md px-3 py-2 border border-stone-200 dark:border-stone-700 text-clay-600 dark:text-clay-400 font-bold text-center">
                                            {inflationRate} %
                                        </div>
                                        <input type="range" min="0" max="6" step="0.1" value={num(inflationRate)} onChange={(e) => setInflationRate(Number(e.target.value))} className="w-full accent-clay" />
                                    </div>
                                </div>
                            </div>
                        </Card>
                    </div>

                    <div className="lg:col-span-2 space-y-6">
                        <Card className="p-4 md:p-6 flex flex-col h-full">
                            <SectionTitle title="複利與通脹折算曲線 (三階段模型)" subtitle="Growth Trajectory" />
                            <div className="w-full h-[300px] sm:h-[350px] lg:h-[450px]">
                                <canvas ref={chartRef}></canvas>
                            </div>

                            <div className="mt-8 border-t border-stone-100 dark:border-stone-800 pt-6 space-y-6">
                                <h3 className="text-sm font-bold text-stone-800 dark:text-stone-200 tracking-wider flex items-center gap-2">
                                    <Icons.TrendingUp/> 實質購買力進度碑
                                </h3>
                                
                                {/* 調整為 3 欄位均分排版 (grid-cols-3)，並只保留 100萬、200萬、300萬 */}
                                <div className="grid grid-cols-3 gap-2 md:gap-4">
                                    {[1000000, 2000000, 3000000].map((milestone) => {
                                        const mData = chartData.data.find(d => d.實質購買力 >= milestone);
                                        return (
                                            <div key={milestone} className="bg-stone-50 dark:bg-stone-800/30 p-2 md:p-4 rounded-xl border border-stone-200/50 dark:border-stone-700/50 text-center flex flex-col justify-center hover:border-stone-300 dark:hover:border-stone-600 smooth-transition cursor-default">
                                                <div className="text-[9px] md:text-[11px] text-stone-500 dark:text-stone-400 mb-1.5 font-medium tracking-widest">{milestone / 10000}萬 實質進度</div>
                                                {mData ? (
                                                    <>
                                                        <div className="font-bold text-base md:text-xl text-stone-900 dark:text-stone-100">{mData.ageStr}</div>
                                                        <div className="text-[8px] md:text-[10px] text-stone-500 mt-1 uppercase tracking-wider">{mData.yearStr} 達成</div>
                                                    </>
                                                ) : (
                                                    <div className="font-bold text-base md:text-xl text-stone-300 dark:text-stone-700">—</div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="p-5 md:p-8 rounded-xl border border-sage-200 dark:border-sage-800/50 bg-sage-50/50 dark:bg-sage-900/10 shadow-sm relative overflow-hidden flex flex-col sm:flex-row items-center justify-between gap-6 sm:gap-4 md:gap-6 hover:shadow-md smooth-transition">
                                    <div className="absolute top-0 right-0 w-24 md:w-32 h-24 md:h-32 bg-sage-200/40 dark:bg-sage-800/30 rounded-bl-full -mr-12 md:-mr-16 -mt-12 md:-mt-16 pointer-events-none"></div>
                                    <div className="absolute bottom-0 left-0 w-16 md:w-24 h-16 md:h-24 bg-sage-200/30 dark:bg-sage-800/20 rounded-tr-full -ml-8 md:-ml-12 -mb-8 md:-mb-12 pointer-events-none"></div>
                                    
                                    <div className="flex-1 z-10 w-full text-center sm:text-left">
                                        <p className="text-[10px] md:text-xs text-stone-500 dark:text-stone-400 tracking-widest mb-1.5 md:mb-2 font-bold uppercase">達標 {(num(target)/10000)}萬(實質) 需時</p>
                                        <div className="text-3xl md:text-4xl font-black text-sage-600 dark:text-sage-400 my-1 md:my-2">
                                            {hit ? (
                                                <div className="flex items-baseline justify-center sm:justify-start">
                                                    {y > 0 && <span>{y}<span className="text-lg md:text-xl mx-1 text-sage-500/70 font-normal">年</span></span>}
                                                    {m > 0 && <span>{m}<span className="text-lg md:text-xl ml-1 text-sage-500/70 font-normal">個月</span></span>}
                                                    {y === 0 && m === 0 && <span>已達標</span>}
                                                </div>
                                            ) : '—'}
                                        </div>
                                        <p className="text-[10px] md:text-xs text-stone-500">預計達成時間: <strong className="text-stone-700 dark:text-stone-300 text-sm md:text-base ml-1">{hit ? `${hit.yearStr} (${hit.ageStr})` : '—'}</strong></p>
                                    </div>

                                    <div className="hidden sm:block w-px h-16 md:h-24 bg-sage-200/80 dark:bg-sage-800/80 z-10"></div>
                                    <div className="sm:hidden h-px w-full bg-sage-200/80 dark:bg-sage-800/80 z-10"></div>

                                    <div className="flex-1 z-10 w-full text-center sm:text-left">
                                        <p className="text-[10px] md:text-xs text-stone-500 dark:text-stone-400 tracking-widest mb-1.5 md:mb-2 font-bold uppercase">達標後 4% 被動收入</p>
                                        <div className="text-3xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-sage-600 dark:text-sage-400 my-1 md:my-2"><span className="text-lg sm:text-base md:text-lg lg:text-xl mr-1 opacity-60 font-normal">HKD</span>{Math.round((num(target) * 0.04) / 12).toLocaleString()} <span className="text-sm md:text-base font-normal opacity-80">/ 月</span></div>
                                        <p className="text-[9px] md:text-[11px] text-sage-600/70 dark:text-sage-500 mt-1 md:mt-2">基於實質購買力計算，具備抗通脹能力</p>
                                    </div>
                                </div>
                            </div>

                        </Card>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
