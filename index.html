        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-[#121212] text-stone-200 p-6">
                            <div className="max-w-xl w-full text-center space-y-6">
                                <h2 className="text-xl font-light text-clay-400">系統中斷</h2>
                                <p className="text-sm text-stone-500">請擷取此錯誤日誌以供除錯。</p>
                                <pre className="bg-stone-900 p-4 md:p-6 rounded-lg text-left text-xs md:text-sm text-stone-400 overflow-auto border border-stone-800">{this.state.error?.toString()}</pre>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const calculateXIRR = (cashFlows) => {
            const validFlows = cashFlows
                .filter(cf => cf.date && !isNaN(Number(cf.amount)) && Number(cf.amount) !== 0)
                .map(cf => ({ date: new Date(cf.date), amount: Number(cf.amount) }))
                .sort((a, b) => a.date - b.date);

            if (validFlows.length < 2) return null;
            const hasPositive = validFlows.some(cf => cf.amount > 0);
            const hasNegative = validFlows.some(cf => cf.amount < 0);
            if (!hasPositive || !hasNegative) return null; 

            const t0 = validFlows[0].date.getTime();
            const days = validFlows.map(cf => (cf.date.getTime() - t0) / (1000 * 3600 * 24));
            const amounts = validFlows.map(cf => cf.amount);

            const xnpv = (rate) => amounts.reduce((sum, amount, i) => sum + amount / Math.pow(1 + rate, days[i] / 365), 0);
            const xnpvDerivative = (rate) => amounts.reduce((sum, amount, i) => {
                if (days[i] === 0) return sum;
                return sum - (amount * (days[i] / 365)) / Math.pow(1 + rate, (days[i] / 365) + 1);
            }, 0);

            const guesses = [0.1, -0.1, 0.5, -0.5, 1.0];
            const maxIters = 100;
            const tolerance = 1e-6;

            for (let guess of guesses) {
                let rate = guess;
                let success = true;
                for (let i = 0; i < maxIters; i++) {
                    const fValue = xnpv(rate);
                    const fDerivative = xnpvDerivative(rate);
                    if (Math.abs(fDerivative) < 1e-10) { success = false; break; }
                    const newRate = rate - fValue / fDerivative;
                    if (Math.abs(newRate - rate) < tolerance) { return newRate; }
                    rate = newRate;
                }
            }
            return null; 
        };

        function App() {
            const [activeTab, setActiveTab] = useState('budget'); 

            const useLocalStorage = (key, initialValue) => {
                const [storedValue, setStoredValue] = useState(() => {
                    try {
                        const item = window.localStorage.getItem(key);
                        return item ? JSON.parse(item) : initialValue;
                    } catch (error) { return initialValue; }
                });
                const setValue = (value) => {
                    try {
                        const valueToStore = value instanceof Function ? value(storedValue) : value;
                        setStoredValue(valueToStore);
                        window.localStorage.setItem(key, JSON.stringify(valueToStore));
                    } catch (error) {}
                };
                return [storedValue, setValue];
            };

            const [isDarkMode, setIsDarkMode] = useLocalStorage('fire_theme_dark', true); 

            useEffect(() => {
                const htmlRoot = document.documentElement;
                if (isDarkMode) {
                    htmlRoot.classList.add('dark');
                    htmlRoot.style.backgroundColor = '#121212';
                } else {
                    htmlRoot.classList.remove('dark');
                    htmlRoot.style.backgroundColor = '#faf9f8';
                }
            }, [isDarkMode]);

            // ==========================================
            // 1. 個人 FIRE 系統狀態變數
            // ==========================================
            const [targetMonthlyIncome, setTargetMonthlyIncome] = useLocalStorage('fire_target_income_v5', 20000); 
            const [withdrawalRate, setWithdrawalRate] = useLocalStorage('fire_withdrawal_rate_v5', 5.5);
            
            const { baseTarget, cashTent, target } = useMemo(() => {
                const rate = num(withdrawalRate) || 4.0;
                const monthly = num(targetMonthlyIncome);
                const base = (monthly * 12) / (rate / 100);
                const tent = (monthly * 0.9) * 24; 
                const total = base + tent;
                return { baseTarget: base, cashTent: tent, target: total };
            }, [targetMonthlyIncome, withdrawalRate]);

            const [birthDate, setBirthDate] = useLocalStorage('fire_birth_date_v1', '1999-07-25');
            const currentAgeObj = useMemo(() => {
                if (!birthDate) return { years: 26, months: 0 };
                const today = new Date(); 
                const dob = new Date(birthDate);
                let years = today.getFullYear() - dob.getFullYear();
                let months = today.getMonth() - dob.getMonth();
                if (today.getDate() < dob.getDate()) months--;
                if (months < 0) { years--; months += 12; }
                return { years, months };
            }, [birthDate]);

            const [spareCash, setSpareCash] = useLocalStorage('fire_spare_cash_v3', 50000);
            const [xirrRecords, setXirrRecords] = useLocalStorage('fire_xirr_records_v4', [
                { id: '1', date: '2022-08-11', amount: -70000 },
                { id: '31', date: '2025-11-09', amount: 530294 },
                { id: '37', date: '2026-07-02', amount: 324533 }
            ]);
            const [rebalanceTickers, setRebalanceTickers] = useLocalStorage('fire_rebalance_tickers_v1', [
                { symbol: 'AVDV', targetPct: 13.5, currentVal: 4720 },
                { symbol: 'AVUV', targetPct: 16.5, currentVal: 6295 },
                { symbol: 'IMOM', targetPct: 18.0, currentVal: 6374 },
                { symbol: 'IVAL', targetPct: 13.5, currentVal: 4717 },
                { symbol: 'QMOM', targetPct: 22.0, currentVal: 7832 },
                { symbol: 'QVAL', targetPct: 16.5, currentVal: 6011 }
            ]);
            const [rawNewMoney, setRawNewMoney] = useLocalStorage('fire_rebalance_money_v1', 5644);

            const latestMarketValue = useMemo(() => {
                const positiveRecords = xirrRecords
                    .filter(r => Number(r.amount) > 0 && r.date)
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
                return positiveRecords.length > 0 ? Number(positiveRecords[0].amount) : 0;
            }, [xirrRecords]);
            
            const schedule = useMemo(() => {
                let balance = 630513;
                const data = [];
                const startDate = new Date(2025, 10, 29);
                const currentPeriod = 9; 
                for (let i = 1; i <= 39; i++) {
                    const interest = balance * (0.14 / 12);
                    const principal = 20208.62 - interest;
                    balance = Math.max(0, balance - principal);
                    const d = new Date(startDate);
                    d.setMonth(d.getMonth() + (i - 1));
                    data.push({
                        period: i, date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`,
                        pmt: 20208.62, oldDebt: (i >= 9 && i <= 14) ? 10000 : 0, principal, interest, balance,
                        status: i < currentPeriod ? 'paid' : (i === currentPeriod ? 'current' : 'future')
                    });
                }
                for(let i = 40; i <= 51; i++) {
                    const d = new Date(startDate);
                    d.setMonth(d.getMonth() + (i - 1));
                    data.push({ 
                        period: i, date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`, 
                        pmt: 20000, oldDebt: 0, principal: 0, interest: 0, balance: 0, 
                        status: i < currentPeriod ? 'paid' : (i === currentPeriod ? 'current' : 'success_fee')
                    });
                }
                return data;
            }, []);

            const autoStage1Months = useMemo(() => schedule.filter(r => r.oldDebt > 0 && r.status !== 'paid').length, [schedule]);
            const autoStage2Months = useMemo(() => schedule.filter(r => r.oldDebt === 0 && r.status !== 'paid' && r.period <= 51).length, [schedule]);

            const outstandingLoan = useMemo(() => {
                const paidData = schedule.filter(r => r.status === 'paid');
                const pmt = 20208.62;
                const oldDebt = 60000; 
                const successFee = 240000; 
                const totalExpectedReturn = (pmt * 39) + oldDebt + successFee; 
                let collectedSoFar = 0;
                paidData.forEach(r => { collectedSoFar += (r.pmt + r.oldDebt); });
                const totalRemainingAll = totalExpectedReturn - collectedSoFar; 
                const expectedProfit = totalExpectedReturn - 630513 - oldDebt; 
                const lastPaid = paidData.length > 0 ? paidData[paidData.length - 1].balance : 630513;
                return { mainBalance: lastPaid, oldDebt: oldDebt, totalPrincipal: lastPaid + oldDebt, totalExpectedReturn, totalRemainingAll, expectedProfit, collectedSoFar };
            }, [schedule]);

            const netWorthExcludeLoan = num(spareCash) + num(latestMarketValue);
            const netWorthIncludeLoan = netWorthExcludeLoan + outstandingLoan.totalPrincipal;

            const totalIncome = 32210 + 20208 + 10000; 
            const [expenses, setExpenses] = useLocalStorage('fire_expenses_v3', 15000);
            const [mpf, setMpf] = useLocalStorage('fire_mpf_v3', 1500);
            const availableSavings = totalIncome - num(expenses) - num(mpf);

            const [contributionStage2, setContributionStage2] = useLocalStorage('fire_stage2_cont_v3', 15000); 
            const [contributionStage3, setContributionStage3] = useLocalStorage('fire_stage3_cont_v3', 25000); 

            const [annualReturn, setAnnualReturn] = useLocalStorage('fire_return_v3', 10);
            const [inflationRate, setInflationRate] = useLocalStorage('fire_inflation_v3', 2.5);

            // ==========================================
            // 2. 客製化 FIRE 系統狀態變數 (為他人計算)
            // ==========================================
            const [othersTargetMonthlyIncome, setOthersTargetMonthlyIncome] = useLocalStorage('fire_others_target_v1', 20000);
            const [othersWithdrawalRate, setOthersWithdrawalRate] = useLocalStorage('fire_others_wr_v1', 4.0);
            const [othersBirthDate, setOthersBirthDate] = useLocalStorage('fire_others_dob_v1', '1990-01-01');
            const [othersInitialCapital, setOthersInitialCapital] = useLocalStorage('fire_others_cap_v1', 0);
            const [othersMpfBalance, setOthersMpfBalance] = useLocalStorage('fire_others_mpf_bal_v1', 0);
            const [othersMpfMonthly, setOthersMpfMonthly] = useLocalStorage('fire_others_mpf_mo_v1', 1500);
            const [othersMpfReturn, setOthersMpfReturn] = useLocalStorage('fire_others_mpf_ret_v1', 5.0);
            const [othersEnableOALA, setOthersEnableOALA] = useLocalStorage('fire_others_oala_v1', false);
            const [othersAnnualReturn, setOthersAnnualReturn] = useLocalStorage('fire_others_ret_v1', 8.0);
            const [othersInflationRate, setOthersInflationRate] = useLocalStorage('fire_others_inf_v1', 2.5);
            const [othersFireStages, setOthersFireStages] = useLocalStorage('fire_others_stages_v1', [
                { id: 's1', name: '首十年衝刺期', months: 120, amount: 15000, isLast: false },
                { id: 's2', name: '常規儲蓄 (餘下歲月)', months: 0, amount: 20000, isLast: true }
            ]);

            const othersAgeObj = useMemo(() => {
                if (!othersBirthDate) return { years: 30, months: 0 };
                const today = new Date();
                const dob = new Date(othersBirthDate);
                let years = today.getFullYear() - dob.getFullYear();
                let months = today.getMonth() - dob.getMonth();
                if (today.getDate() < dob.getDate()) months--;
                if (months < 0) { years--; months += 12; }
                return { years, months };
            }, [othersBirthDate]);

            const { othersBaseTarget, othersCashTent, othersTarget } = useMemo(() => {
                const rate = num(othersWithdrawalRate) || 4.0;
                const monthly = num(othersTargetMonthlyIncome);
                const base = (monthly * 12) / (rate / 100);
                const tent = (monthly * 0.9) * 24; 
                const total = base + tent;
                return { othersBaseTarget: base, othersCashTent: tent, othersTarget: total };
            }, [othersTargetMonthlyIncome, othersWithdrawalRate]);

            // ==========================================
            // 3. 多維度預算場景
            // ==========================================
            const defaultCurrentCats = [
                { id: 'housing', label: '居住與水電', color: isDarkMode ? '#6b8496' : '#8ba2b3', icon: '🏠', items: [
                    { id: 'housing_rent', label: '租金 / 房貸', value: 0 },
                    { id: 'housing_mgt', label: '管理費', value: 0 },
                    { id: 'housing_rates', label: '差餉', value: 0 },
                    { id: 'housing_broadband', label: '寬頻', value: 150 },
                    { id: 'housing_mobile', label: '電話費', value: 100 }
                ]},
                { id: 'food', label: '餐飲', color: isDarkMode ? '#cfa293' : '#b87a67', icon: '🍽️', items: [
                    { id: 'food_dining', label: '外食', value: 4500 },
                    { id: 'food_cooking', label: '家煮', value: 2000 }
                ]},
                { id: 'transport', label: '交通出行', color: isDarkMode ? '#799477' : '#a1bea0', icon: '🚆', items: [
                    { id: 'transport_public', label: '公共交通', value: 800 },
                    { id: 'transport_car', label: '養車', value: 500 }
                ]},
                { id: 'personal', label: '個人與娛樂', color: isDarkMode ? '#d6d3cd' : '#a8a49c', icon: '🛍️', items: [
                    { id: 'personal_clothes', label: '服飾', value: 500 },
                    { id: 'personal_beauty', label: '美容', value: 300 },
                    { id: 'personal_hair', label: '剪髮', value: 200 },
                    { id: 'personal_ent', label: '娛樂', value: 500 },
                    { id: 'personal_sub', label: '訂閱', value: 200 },
                    { id: 'personal_hobby', label: '嗜好', value: 300 }
                ]},
                { id: 'family', label: '家庭、日用與保險', color: isDarkMode ? '#a8a49c' : '#5c5952', icon: '👨‍👩‍👧', items: [
                    { id: 'family_grocery', label: '日常雜貨', value: 1000 },
                    { id: 'family_parents', label: '父母家用', value: 5000 },
                    { id: 'family_insurance', label: '保險', value: 1500 }
                ]},
                { id: 'other', label: '其他備用', color: isDarkMode ? '#45423d' : '#e8e6e1', icon: '📦', items: [
                    { id: 'other_misc', label: '未預見雜費', value: 500 },
                    { id: 'other_buffer', label: '緩衝區', value: 500 }
                ]}
            ];
            const defaultScenarios = [
                { id: 'current', name: '現時生活成本', isProtected: true, syncTarget: 'expenses', cats: defaultCurrentCats },
                { id: 'retirement', name: '未來退休生活', isProtected: true, syncTarget: 'fire', cats: JSON.parse(JSON.stringify(defaultCurrentCats)) }
            ];
            // 更新版本號強制寫入完整的開支細項
            const [budgetScenarios, setBudgetScenarios] = useLocalStorage('fire_budget_scenarios_v6', defaultScenarios);

            useEffect(() => {
                const updateColors = (cats) => cats.map(cat => {
                    let color = cat.color;
                    if (cat.id === 'housing') color = isDarkMode ? '#6b8496' : '#8ba2b3';
                    if (cat.id === 'food') color = isDarkMode ? '#cfa293' : '#b87a67';
                    if (cat.id === 'transport') color = isDarkMode ? '#799477' : '#a1bea0';
                    if (cat.id === 'personal') color = isDarkMode ? '#d6d3cd' : '#a8a49c';
                    if (cat.id === 'family') color = isDarkMode ? '#a8a49c' : '#5c5952';
                    if (cat.id === 'other') color = isDarkMode ? '#45423d' : '#e8e6e1';
                    return { ...cat, color };
                });
                
                setBudgetScenarios(prev => prev.map(scenario => ({
                    ...scenario,
                    cats: updateColors(scenario.cats)
                })));
            }, [isDarkMode]);

            // ==========================================
            // 4. 圖表數據計算 (拆分為個人與他人)
            // ==========================================
            const chartDataPersonal = useMemo(() => {
                let balance = num(latestMarketValue);
                let realBalance = num(latestMarketValue);
                let months = 0;
                const numAnnualReturn = num(annualReturn);
                const numInflation = num(inflationRate);
                const safeTarget = num(target) || 1; 
                const monthlyRate = (numAnnualReturn / 100) / 12;
                const data = [];
                
                const baseYear = 2026;
                const baseMonth = 7;
                
                const startAgeYears = currentAgeObj.years;
                const startAgeMonths = currentAgeObj.months;
                const startTotalMonths = startAgeYears * 12 + startAgeMonths;

                data.push({ 
                    monthsElapsed: 0, yearStr: `${baseYear}年${baseMonth}月`, ageStr: `${startAgeYears}歲${startAgeMonths > 0 ? startAgeMonths + '個月' : ''}`,
                    ageFloat: startAgeYears + startAgeMonths / 12, 總資產: balance, 實質購買力: realBalance, 投入本金: balance 
                });

                let totalPrincipal = balance;
                let limit = 0;

                while (realBalance < safeTarget * 1.5 && limit < 600) { 
                    limit++; months++;
                    let currentContribution = 0;
                    if (months <= autoStage1Months) { currentContribution = num(availableSavings); } 
                    else if (months <= autoStage1Months + autoStage2Months) { currentContribution = num(contributionStage2); } 
                    else { currentContribution = num(contributionStage3); }

                    const interest = balance * monthlyRate;
                    balance = balance + interest + currentContribution;
                    realBalance = balance / Math.pow(1 + numInflation/100, months/12);
                    totalPrincipal += currentContribution;

                    let currentY = baseYear + Math.floor((baseMonth - 1 + months) / 12);
                    let currentM = ((baseMonth - 1 + months) % 12) + 1;
                    let totalM = startTotalMonths + months;
                    let ageY = Math.floor(totalM / 12);
                    let ageM = totalM % 12;
                    let ageFloat = totalM / 12;

                    data.push({
                        monthsElapsed: months, yearStr: `${currentY}年${currentM}月`, ageStr: `${ageY}歲${ageM > 0 ? ageM + '個月' : ''}`,
                        ageFloat: ageFloat, 總資產: Math.round(balance), 實質購買力: Math.round(realBalance), 投入本金: Math.round(totalPrincipal)
                    });
                }
                const exactTargetData = data.find(d => d.實質購買力 >= safeTarget);
                return { data, targetHit: exactTargetData || null };
            }, [latestMarketValue, availableSavings, contributionStage2, contributionStage3, autoStage1Months, autoStage2Months, annualReturn, currentAgeObj, inflationRate, target]);

            const chartDataOthers = useMemo(() => {
                let mainBalance = num(othersInitialCapital);
                let mpfVal = num(othersMpfBalance);
                
                let months = 0;
                const numAnnualReturn = num(othersAnnualReturn);
                const numMpfReturn = num(othersMpfReturn);
                const numInflation = num(othersInflationRate);
                
                const mainMonthlyRate = (numAnnualReturn / 100) / 12;
                const mpfMonthlyRate = (numMpfReturn / 100) / 12;
                
                const data = [];
                
                const baseYear = new Date().getFullYear();
                const baseMonth = new Date().getMonth() + 1;
                
                const startAgeYears = othersAgeObj.years;
                const startAgeMonths = othersAgeObj.months;
                const startTotalMonths = startAgeYears * 12 + startAgeMonths;
                
                let targetHitData = null;
                let limit = 0;
                let currentStageIdx = 0;
                let monthsInCurrentStage = 0;
                let totalPrincipal = mainBalance + mpfVal;

                data.push({ 
                    monthsElapsed: 0, yearStr: `${baseYear}年${baseMonth}月`, ageStr: `${startAgeYears}歲${startAgeMonths > 0 ? startAgeMonths + '個月' : ''}`,
                    ageFloat: startAgeYears + startAgeMonths / 12, 總資產: mainBalance + mpfVal, MPF資產: mpfVal, 實質購買力: mainBalance + mpfVal, 
                    投入本金: totalPrincipal, 動態目標: num(othersTarget)
                });

                while (limit < 720) { 
                    limit++; months++;
                    
                    let currentStage = othersFireStages[currentStageIdx];
                    let currentContribution = num(currentStage?.amount || 0);
                    
                    monthsInCurrentStage++;
                    if (currentStage && !currentStage.isLast && monthsInCurrentStage >= num(currentStage.months)) {
                        currentStageIdx = Math.min(currentStageIdx + 1, othersFireStages.length - 1);
                        monthsInCurrentStage = 0; 
                    }

                    const mainInterest = mainBalance * mainMonthlyRate;
                    mainBalance = mainBalance + mainInterest + currentContribution;
                    
                    const mpfInterest = mpfVal * mpfMonthlyRate;
                    mpfVal = mpfVal + mpfInterest + num(othersMpfMonthly);
                    
                    totalPrincipal += currentContribution + num(othersMpfMonthly);

                    let currentY = baseYear + Math.floor((baseMonth - 1 + months) / 12);
                    let currentM = ((baseMonth - 1 + months) % 12) + 1;
                    
                    let totalM = startTotalMonths + months;
                    let ageY = Math.floor(totalM / 12);
                    let ageM = totalM % 12;
                    let ageFloat = totalM / 12;

                    // 處理香港長者福利聯動
                    let allowance = 0;
                    if (ageY >= 65 && othersEnableOALA) {
                        allowance = 4345; // 長生津
                    } else if (ageY >= 70 && !othersEnableOALA) {
                        allowance = 1675; // 生果金預設
                    } else if (ageY >= 70 && othersEnableOALA) {
                        allowance = 4345; // 已領長生津者繼續領
                    }

                    let dynamicMonthlyNeed = Math.max(0, num(othersTargetMonthlyIncome) - allowance);
                    let dynamicTargetBase = (dynamicMonthlyNeed * 12) / (num(othersWithdrawalRate) / 100);
                    let dynamicTargetTotal = dynamicTargetBase + othersCashTent;
                    if (dynamicTargetTotal === 0) dynamicTargetTotal = 1;

                    let totalNominal = mainBalance + mpfVal;
                    let realBalance = totalNominal / Math.pow(1 + numInflation/100, months/12);

                    data.push({
                        monthsElapsed: months, yearStr: `${currentY}年${currentM}月`, ageStr: `${ageY}歲${ageM > 0 ? ageM + '個月' : ''}`,
                        ageFloat: ageFloat, 總資產: Math.round(totalNominal), MPF資產: Math.round(mpfVal), 實質購買力: Math.round(realBalance), 
                        投入本金: Math.round(totalPrincipal), 動態目標: Math.round(dynamicTargetTotal)
                    });
                    
                    if (!targetHitData && realBalance >= dynamicTargetTotal) {
                        targetHitData = data[data.length - 1];
                    }
                    if (realBalance >= num(othersTarget) * 1.5 && months > 120) break;
                }
                
                return { data, targetHit: targetHitData };
            }, [othersInitialCapital, othersMpfBalance, othersMpfMonthly, othersMpfReturn, othersFireStages, othersAnnualReturn, othersAgeObj, othersInflationRate, othersTargetMonthlyIncome, othersWithdrawalRate, othersCashTent, othersEnableOALA, othersTarget]);

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-stone-50 dark:bg-[#121212] text-stone-800 dark:text-stone-200 font-sans transition-colors duration-500 selection:bg-sage-200 dark:selection:bg-sage-800 selection:text-stone-900 dark:selection:text-white pb-8">
                        
                        <header className="sticky top-0 z-50 bg-stone-50/90 dark:bg-[#121212]/90 backdrop-blur-xl border-b border-stone-200 dark:border-stone-800/50 transition-colors duration-500 pt-safe">
                            <div className="max-w-7xl mx-auto px-4 md:px-6 h-auto md:h-20 flex flex-col md:flex-row justify-between items-center py-3 md:py-0 gap-3 md:gap-0">
                                <div className="flex items-center justify-between w-full md:w-auto">
                                    <div className="flex flex-col justify-center">
                                        <h1 className="text-lg md:text-base font-bold md:font-semibold tracking-wide flex items-center gap-2">
                                            財務與職涯戰情室
                                        </h1>
                                        <div className="flex items-center gap-1.5 mt-0.5">
                                            <span className="relative flex h-2 w-2">
                                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-sage-400 opacity-75"></span>
                                              <span className="relative inline-flex rounded-full h-2 w-2 bg-sage-500"></span>
                                            </span>
                                            <p className="text-[10px] md:text-xs text-stone-400 dark:text-stone-500 uppercase tracking-widest">2026年7月 即時數據</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="md:ml-12 w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-200 dark:hover:bg-stone-800 transition-all duration-300 active:scale-95 bg-stone-200/50 dark:bg-stone-800/50 md:bg-transparent">
                                        <div className={`w-4 h-4 rounded-full border-2 ${isDarkMode ? 'border-stone-400 bg-transparent' : 'bg-stone-800 border-stone-800'}`}></div>
                                    </button>
                                </div>
                                
                                <div className="flex gap-2 w-full md:w-auto overflow-x-auto hide-scrollbar pb-1 md:pb-0 items-center snap-x snap-mandatory">
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} label="戰情總覽" icon={<Icons.Dashboard/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'budget'} onClick={() => setActiveTab('budget')} label="開支預算" icon={<Icons.Wallet/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'xirr'} onClick={() => setActiveTab('xirr')} label="績效追蹤" icon={<Icons.Activity/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'rebalance'} onClick={() => setActiveTab('rebalance')} label="再平衡" icon={<Icons.Scale/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'salary'} onClick={() => setActiveTab('salary')} label="薪酬階梯" icon={<Icons.TrendingUp/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'loan'} onClick={() => setActiveTab('loan')} label="債務回收" icon={<Icons.Calendar/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'calculator'} onClick={() => setActiveTab('calculator')} label="個人 FIRE" icon={<Icons.Calculator/>} /></div>
                                    <div className="snap-start shrink-0"><TabBtn active={activeTab === 'calculator_others'} onClick={() => setActiveTab('calculator_others')} label="客製 FIRE" icon={<Icons.Users/>} /></div>
                                </div>
                            </div>
                        </header>

                        <main className="max-w-7xl mx-auto px-3 sm:px-4 md:px-6 py-6 md:py-12">
                            <div className="animate-fade-in-up">
                                {activeTab === 'dashboard' && <DashboardTab 
                                    expenses={expenses} setExpenses={setExpenses} mpf={mpf} totalIncome={totalIncome} availableSavings={availableSavings}
                                    targetHit={chartDataPersonal.targetHit} target={target} spareCash={spareCash} setSpareCash={setSpareCash}
                                    latestMarketValue={latestMarketValue} outstandingLoan={outstandingLoan}
                                    netWorthExcludeLoan={netWorthExcludeLoan} netWorthIncludeLoan={netWorthIncludeLoan}
                                />}
                                {activeTab === 'budget' && <BudgetTab 
                                    budgetScenarios={budgetScenarios} setBudgetScenarios={setBudgetScenarios}
                                    setGlobalExpenses={setExpenses} currentGlobalExpenses={expenses} 
                                    setTargetMonthlyIncome={setTargetMonthlyIncome} targetMonthlyIncome={targetMonthlyIncome}
                                    isDark={isDarkMode} 
                                />}
                                {activeTab === 'xirr' && <XirrTab records={xirrRecords} setRecords={setXirrRecords} />}
                                {activeTab === 'rebalance' && <RebalanceTab rawNewMoney={rawNewMoney} setRawNewMoney={setRawNewMoney} tickers={rebalanceTickers} setTickers={setRebalanceTickers} />}
                                {activeTab === 'salary' && <SalaryTab />}
                                {activeTab === 'loan' && <LoanTab schedule={schedule} outstandingLoan={outstandingLoan} />}
                                {activeTab === 'calculator' && <CalculatorTab 
                                    isDark={isDarkMode} birthDate={birthDate} setBirthDate={setBirthDate} currentAgeObj={currentAgeObj}
                                    autoStage1Months={autoStage1Months} autoStage2Months={autoStage2Months}
                                    contributionStage2={contributionStage2} setContributionStage2={setContributionStage2}
                                    contributionStage3={contributionStage3} setContributionStage3={setContributionStage3}
                                    annualReturn={annualReturn} setAnnualReturn={setAnnualReturn}
                                    inflationRate={inflationRate} setInflationRate={setInflationRate}
                                    availableSavings={availableSavings} setExpenses={setExpenses} totalIncome={totalIncome} mpf={mpf}
                                    chartData={chartDataPersonal} target={target} baseTarget={baseTarget} cashTent={cashTent}
                                    targetMonthlyIncome={targetMonthlyIncome} setTargetMonthlyIncome={setTargetMonthlyIncome}
                                    withdrawalRate={withdrawalRate} setWithdrawalRate={setWithdrawalRate}
                                    latestMarketValue={latestMarketValue}
                                />}
                                {activeTab === 'calculator_others' && <CalculatorOthersTab 
                                    isDark={isDarkMode} 
                                    birthDate={othersBirthDate} setBirthDate={setOthersBirthDate} currentAgeObj={othersAgeObj}
                                    customInitialCapital={othersInitialCapital} setCustomInitialCapital={setOthersInitialCapital}
                                    fireStages={othersFireStages} setFireStages={setOthersFireStages}
                                    calcMpfBalance={othersMpfBalance} setCalcMpfBalance={setOthersMpfBalance}
                                    calcMpfMonthly={othersMpfMonthly} setCalcMpfMonthly={setOthersMpfMonthly}
                                    calcMpfReturn={othersMpfReturn} setCalcMpfReturn={setOthersMpfReturn}
                                    enableOALA={othersEnableOALA} setEnableOALA={setOthersEnableOALA}
                                    annualReturn={othersAnnualReturn} setAnnualReturn={setOthersAnnualReturn}
                                    inflationRate={othersInflationRate} setInflationRate={setOthersInflationRate}
                                    chartData={chartDataOthers} target={othersTarget} baseTarget={othersBaseTarget} cashTent={othersCashTent}
                                    targetMonthlyIncome={othersTargetMonthlyIncome} setTargetMonthlyIncome={setOthersTargetMonthlyIncome}
                                    withdrawalRate={othersWithdrawalRate} setWithdrawalRate={setOthersWithdrawalRate}
                                />}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const TabBtn = ({ active, onClick, label, icon }) => (
            <button 
                onClick={onClick} 
                className={`relative px-4 py-2.5 flex items-center gap-2 text-sm font-medium tracking-wide rounded-lg transition-all duration-300 whitespace-nowrap
                ${active ? 'bg-stone-200 dark:bg-stone-800 text-stone-900 dark:text-stone-100 shadow-sm' : 'text-stone-500 hover:text-stone-800 dark:hover:text-stone-200 hover:bg-stone-100 dark:hover:bg-stone-800/50'}`}
            >
                <span className={`${active ? 'text-sage-600 dark:text-sage-400' : 'opacity-70'}`}>{icon}</span>
                {label}
            </button>
        );

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white/70 dark:bg-[#181818]/90 backdrop-blur-sm border border-stone-200/80 dark:border-stone-800/80 rounded-2xl p-5 md:p-8 smooth-transition hover:shadow-lg hover:shadow-stone-200/40 dark:hover:shadow-black/40 hover:-translate-y-0.5 ${className}`}>
                {children}
            </div>
        );

        const SectionTitle = ({ title, subtitle, className = "mb-6 md:mb-8" }) => (
            <div className={`flex flex-col md:flex-row md:items-baseline gap-1 md:gap-3 ${className}`}>
                <h2 className="text-xl font-semibold text-stone-900 dark:text-stone-100">{title}</h2>
                {subtitle && <p className="text-xs text-stone-500 uppercase tracking-widest">{subtitle}</p>}
            </div>
        );

        const InlineInput = ({ value, onChange, prefix = '', colorClass = 'focus:ring-stone-500/30 dark:focus:ring-stone-400/30 focus:border-stone-500', widthClass = 'w-32 md:w-40' }) => (
            <div className="relative flex items-center group">
                {prefix && <span className="text-stone-500 absolute left-3 text-sm z-10 font-medium">{prefix}</span>}
                <input 
                    type="number" value={value} onChange={onChange} placeholder="0"
                    className={`${widthClass} bg-stone-100/80 dark:bg-stone-800/50 border border-transparent hover:border-stone-300 dark:hover:border-stone-600 ${colorClass} focus:ring-4 rounded-lg text-right outline-none transition-all duration-300 font-semibold text-stone-900 dark:text-stone-100 py-2 pr-3 ${prefix ? 'pl-8' : 'pl-3'} shadow-inner shadow-stone-200/20 dark:shadow-black/20 text-sm md:text-base placeholder-stone-400/50`}
                />
                <div className="absolute -right-6 opacity-0 md:group-hover:opacity-100 transition-opacity duration-300 pointer-events-none hidden md:block">
                    <Icons.Edit />
                </div>
            </div>
        );

        function BudgetTab({ budgetScenarios, setBudgetScenarios, setGlobalExpenses, currentGlobalExpenses, setTargetMonthlyIncome, targetMonthlyIncome, isDark }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [syncSuccess, setSyncSuccess] = useState(false);
            
            const [activeScenarioId, setActiveScenarioId] = useState(budgetScenarios[0]?.id || 'current');
            
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [newItemName, setNewItemName] = useState('');
            const [newItemCatId, setNewItemCatId] = useState('housing');
            
            const [isScenarioModalOpen, setIsScenarioModalOpen] = useState(false);
            const [newScenarioName, setNewScenarioName] = useState('');

            const [draggedItemIdx, setDraggedItemIdx] = useState(null);
            const [draggedCatIdx, setDraggedCatIdx] = useState(null);
            const [dragOverCatIdx, setDragOverCatIdx] = useState(null);

            const activeScenarioIdx = budgetScenarios.findIndex(s => s.id === activeScenarioId);
            const activeCats = budgetScenarios[activeScenarioIdx]?.cats || [];

            const updateActiveCats = (newCats) => {
                const newScenarios = [...budgetScenarios];
                newScenarios[activeScenarioIdx].cats = newCats;
                setBudgetScenarios(newScenarios);
            };

            const handleChange = (catIndex, itemIndex, value) => {
                const newCats = [...activeCats];
                newCats[catIndex].items[itemIndex].value = value === '' ? '' : Number(value);
                updateActiveCats(newCats);
            };

            const handleDelete = (catIndex, itemIndex) => {
                const newCats = [...activeCats];
                newCats[catIndex].items.splice(itemIndex, 1);
                updateActiveCats(newCats);
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!newItemName.trim()) return;
                const newCats = [...activeCats];
                const catIndex = newCats.findIndex(c => c.id === newItemCatId);
                if (catIndex > -1) {
                    newCats[catIndex].items.push({ id: `custom_${Date.now()}`, label: newItemName.trim(), value: 0 });
                    updateActiveCats(newCats);
                }
                setNewItemName('');
                setIsAddModalOpen(false);
            };
            
            const handleAddScenario = (e) => {
                e.preventDefault();
                if (!newScenarioName.trim()) return;
                const newId = `scenario_${Date.now()}`;
                
                const templateCats = JSON.parse(JSON.stringify(budgetScenarios[0].cats));
                templateCats.forEach(cat => cat.items.forEach(item => item.value = 0));
                
                const newScenarios = [...budgetScenarios, {
                    id: newId, name: newScenarioName.trim(), isProtected: false, syncTarget: 'none', cats: templateCats
                }];
                
                setBudgetScenarios(newScenarios);
                setActiveScenarioId(newId);
                setNewScenarioName('');
                setIsScenarioModalOpen(false);
            };
            
            const handleDeleteScenario = (id) => {
                if (budgetScenarios.length <= 1) return;
                const newScenarios = budgetScenarios.filter(s => s.id !== id);
                setBudgetScenarios(newScenarios);
                setActiveScenarioId(newScenarios[0].id);
            };

            const handleDragStart = (e, catIdx, itemIdx) => {
                setDraggedCatIdx(catIdx); setDraggedItemIdx(itemIdx); e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => { e.target.classList.add('opacity-50'); }, 0);
            };
            const handleDragOver = (e, catIdx) => {
                e.preventDefault(); e.dataTransfer.dropEffect = 'move';
                if (dragOverCatIdx !== catIdx) setDragOverCatIdx(catIdx);
            };
            const handleDragEnd = (e) => {
                e.target.classList.remove('opacity-50');
                setDraggedCatIdx(null); setDraggedItemIdx(null); setDragOverCatIdx(null);
            };
            const handleDropOnCategory = (e, targetCatIdx) => {
                e.preventDefault();
                if (draggedCatIdx === null || draggedItemIdx === null) return;
                if (draggedCatIdx === targetCatIdx && activeCats[targetCatIdx].items.length - 1 === draggedItemIdx) {
                    setDragOverCatIdx(null); return;
                }
                const newCats = [...activeCats];
                const draggedItem = newCats[draggedCatIdx].items.splice(draggedItemIdx, 1)[0];
                newCats[targetCatIdx].items.push(draggedItem);
                updateActiveCats(newCats);
                setDragOverCatIdx(null); setDraggedCatIdx(null); setDraggedItemIdx(null);
            };
            const handleDropOnItem = (e, targetCatIdx, targetItemIdx) => {
                e.preventDefault(); e.stopPropagation();
                if (draggedCatIdx === null || draggedItemIdx === null) return;
                if (draggedCatIdx === targetCatIdx && draggedItemIdx === targetItemIdx) {
                    setDragOverCatIdx(null); return;
                }
                const newCats = [...activeCats];
                const draggedItem = newCats[draggedCatIdx].items.splice(draggedItemIdx, 1)[0];
                let insertIdx = targetItemIdx;
                if (draggedCatIdx === targetCatIdx && draggedItemIdx < targetItemIdx) insertIdx -= 1;
                newCats[targetCatIdx].items.splice(insertIdx, 0, draggedItem);
                updateActiveCats(newCats);
                setDragOverCatIdx(null); setDraggedCatIdx(null); setDraggedItemIdx(null);
            };

            const { totalBudget, categoryTotals } = useMemo(() => {
                let total = 0;
                const catTotals = [];
                activeCats.forEach(cat => {
                    let catTotal = 0;
                    cat.items.forEach(item => { const val = num(item.value); catTotal += val; total += val; });
                    catTotals.push({ id: cat.id, label: cat.label, total: catTotal, color: cat.color });
                });
                return { totalBudget: total, categoryTotals: catTotals };
            }, [activeCats]);

            useEffect(() => {
                if (!chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();

                const ctx = chartRef.current.getContext('2d');
                const filteredData = categoryTotals.filter(c => c.total > 0);

                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: filteredData.map(c => c.label),
                        datasets: [{
                            data: filteredData.map(c => c.total),
                            backgroundColor: filteredData.map(c => c.color),
                            borderWidth: isDark ? 2 : 0, borderColor: isDark ? '#181818' : '#ffffff', hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '75%',
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: isDark ? 'rgba(28, 27, 26, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                                titleColor: isDark ? '#e8e6e1' : '#1c1b1a', bodyColor: isDark ? '#d6d3cd' : '#5c5952',
                                borderColor: isDark ? '#45423d' : '#e8e6e1', borderWidth: 1, cornerRadius: 8, padding: 12,
                                bodyFont: { family: 'Inter', size: 13, weight: 'bold' },
                                callbacks: {
                                    label: (context) => {
                                        const value = context.parsed;
                                        const percentage = ((value / totalBudget) * 100).toFixed(1);
                                        return ` $${value.toLocaleString()} (${percentage}%)`;
                                    }
                                }
                            }
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [categoryTotals, totalBudget, isDark]);

            const currentScenario = budgetScenarios[activeScenarioIdx];
            
            const handleSync = () => {
                if (!currentScenario) return;
                if (currentScenario.syncTarget === 'expenses') {
                    setGlobalExpenses(totalBudget);
                } else if (currentScenario.syncTarget === 'fire') {
                    setTargetMonthlyIncome(totalBudget);
                }
                setSyncSuccess(true);
                setTimeout(() => setSyncSuccess(false), 2000);
            };

            const isSynced = currentScenario?.syncTarget === 'expenses' 
                ? totalBudget === currentGlobalExpenses 
                : currentScenario?.syncTarget === 'fire' 
                ? totalBudget === targetMonthlyIncome 
                : true; 
                
            const syncTargetText = currentScenario?.syncTarget === 'expenses' ? '現時生活總開支' : 'FIRE 目標被動收入';
            const unsyncedWarningText = currentScenario?.syncTarget === 'expenses' 
                ? `目前戰情室現時總開支為 $${currentGlobalExpenses.toLocaleString()}，與試算不符。`
                : `目前個人 FIRE 計算機設定被動收入為 $${targetMonthlyIncome.toLocaleString()}，與試算不符。`;

            return (
                <div className="animate-fade-in-up space-y-6 md:space-y-8">
                    {isAddModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-[#181818] rounded-2xl w-full max-w-md shadow-2xl border border-stone-200 dark:border-stone-800 animate-modal-in overflow-hidden">
                                <div className="p-5 md:p-6 border-b border-stone-100 dark:border-stone-800 flex justify-between items-center bg-stone-50/50 dark:bg-stone-900/30">
                                    <h3 className="font-bold text-lg text-stone-900 dark:text-stone-100 flex items-center gap-2"><Icons.PlusCircle/> 新增自訂開支</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} className="text-stone-400 hover:text-stone-700 dark:hover:text-stone-300 p-1"><Icons.X /></button>
                                </div>
                                <form onSubmit={handleAddItem} className="p-5 md:p-6 space-y-5">
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-widest block">開支名稱</label>
                                        <input type="text" required autoFocus value={newItemName} onChange={e => setNewItemName(e.target.value)} placeholder="例如：手錶供款、PS5遊戲" className="w-full bg-stone-50 dark:bg-stone-800/50 border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2.5 outline-none focus:border-sage-500 focus:ring-1 focus:ring-sage-500 smooth-transition" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-widest block">歸屬分類</label>
                                        <select value={newItemCatId} onChange={e => setNewItemCatId(e.target.value)} className="w-full bg-stone-50 dark:bg-stone-800/50 border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2.5 outline-none focus:border-sage-500 focus:ring-1 focus:ring-sage-500 smooth-transition appearance-none">
                                            {activeCats.map(cat => ( <option key={cat.id} value={cat.id}>{cat.icon} {cat.label}</option> ))}
                                        </select>
                                    </div>
                                    <div className="pt-2">
                                        <button type="submit" className="w-full bg-sage-600 hover:bg-sage-700 dark:bg-sage-500 dark:hover:bg-sage-400 text-white font-bold py-3 rounded-lg shadow-sm active:scale-95 smooth-transition">確定新增</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {isScenarioModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-[#181818] rounded-2xl w-full max-w-md shadow-2xl border border-stone-200 dark:border-stone-800 animate-modal-in overflow-hidden">
                                <div className="p-5 md:p-6 border-b border-stone-100 dark:border-stone-800 flex justify-between items-center bg-stone-50/50 dark:bg-stone-900/30">
                                    <h3 className="font-bold text-lg text-stone-900 dark:text-stone-100 flex items-center gap-2"><Icons.PlusCircle/> 新增多維度預算場景</h3>
                                    <button onClick={() => setIsScenarioModalOpen(false)} className="text-stone-400 hover:text-stone-700 dark:hover:text-stone-300 p-1"><Icons.X /></button>
                                </div>
                                <form onSubmit={handleAddScenario} className="p-5 md:p-6 space-y-5">
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-widest block">場景名稱</label>
                                        <input type="text" required autoFocus value={newScenarioName} onChange={e => setNewScenarioName(e.target.value)} placeholder="例如：結婚後開支、移民生活" className="w-full bg-stone-50 dark:bg-stone-800/50 border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2.5 outline-none focus:border-sage-500 focus:ring-1 focus:ring-sage-500 smooth-transition" />
                                    </div>
                                    <div className="pt-2">
                                        <button type="submit" className="w-full bg-sage-600 hover:bg-sage-700 dark:bg-sage-500 dark:hover:bg-sage-400 text-white font-bold py-3 rounded-lg shadow-sm active:scale-95 smooth-transition">建立場景</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                        <div className="w-full md:w-auto">
                            <SectionTitle title="多維度生活開支預算" subtitle="Scenario-based Budgeting" className="mb-4" />
                            <div className="flex bg-stone-200/50 dark:bg-stone-800/50 p-1 rounded-lg w-full md:w-fit overflow-x-auto hide-scrollbar">
                                {budgetScenarios.map(s => (
                                    <button 
                                        key={s.id} onClick={() => setActiveScenarioId(s.id)}
                                        className={`px-4 py-2 rounded-md text-sm font-bold smooth-transition whitespace-nowrap flex items-center gap-1.5 ${activeScenarioId === s.id ? 'bg-white dark:bg-[#121212] shadow-sm text-sage-600 dark:text-sage-400' : 'text-stone-500 hover:text-stone-700 dark:hover:text-stone-300'}`}
                                    >
                                        {s.name}
                                    </button>
                                ))}
                                <button onClick={() => setIsScenarioModalOpen(true)} className="px-3 py-2 rounded-md text-stone-400 hover:text-stone-700 dark:hover:text-stone-200 smooth-transition">
                                    <Icons.Plus />
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex gap-2 w-full md:w-auto shrink-0 mt-2 md:mt-0">
                            {!currentScenario?.isProtected && (
                                <button onClick={() => handleDeleteScenario(currentScenario.id)} className="flex items-center justify-center px-4 py-2.5 rounded-lg text-sm font-bold smooth-transition shadow-sm border bg-red-50 text-red-600 border-red-200 dark:bg-red-900/20 dark:border-red-900/50 hover:bg-red-100 dark:hover:bg-red-900/40">
                                    <Icons.Trash2 />
                                </button>
                            )}
                            <button onClick={() => setIsAddModalOpen(true)} className="flex-1 md:flex-none items-center justify-center flex gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold smooth-transition shadow-sm border bg-stone-800 hover:bg-stone-900 dark:bg-stone-700 dark:hover:bg-stone-600 text-white border-transparent active:scale-95">
                                <Icons.PlusCircle /> 新增開支
                            </button>
                            {currentScenario?.syncTarget !== 'none' && (
                                <button 
                                    onClick={handleSync} disabled={syncSuccess || isSynced}
                                    className={`flex-1 md:flex-none items-center justify-center flex gap-1.5 px-5 py-2.5 rounded-lg text-sm font-bold smooth-transition shadow-sm border ${
                                        syncSuccess ? 'bg-emerald-500 text-white border-emerald-500 cursor-default' : isSynced ? 'bg-stone-200 dark:bg-stone-800 text-stone-400 dark:text-stone-500 border-transparent cursor-not-allowed' : 'bg-sage-600 hover:bg-sage-700 dark:bg-sage-500 dark:hover:bg-sage-400 text-white border-transparent active:scale-95'
                                    }`}
                                >
                                    {syncSuccess ? <><Icons.CheckCircle /> 已同步</> : isSynced ? <><Icons.CheckCircle /> {syncTargetText}已一致</> : <><Icons.Activity /> 同步 $ {totalBudget.toLocaleString()}</>}
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8 items-start">
                        <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                            {activeCats.map((cat, catIdx) => (
                                <Card key={cat.id} className={`p-4 md:p-5 flex flex-col gap-3 transition-colors duration-200 ${dragOverCatIdx === catIdx ? 'drag-over' : ''}`}>
                                    <div className="w-full h-full min-h-[150px]" onDragOver={(e) => handleDragOver(e, catIdx)} onDrop={(e) => handleDropOnCategory(e, catIdx)}>
                                        <div className="flex items-center gap-2 pb-2 border-b border-stone-100 dark:border-stone-800 pointer-events-none">
                                            <span className="text-lg">{cat.icon}</span>
                                            <h3 className="font-bold text-stone-800 dark:text-stone-200">{cat.label}</h3>
                                            <span className="ml-auto text-xs font-bold text-stone-400 dark:text-stone-500">$ {categoryTotals.find(c => c.id === cat.id)?.total.toLocaleString()}</span>
                                        </div>
                                        <div className="space-y-2 mt-3 relative min-h-[40px]">
                                            {cat.items.length === 0 && <div className="absolute inset-0 flex items-center justify-center text-[10px] text-stone-400 border border-dashed border-stone-200 dark:border-stone-700 rounded-md pointer-events-none">拖曳項目至此</div>}
                                            {cat.items.map((item, itemIdx) => (
                                                <div key={item.id} className="flex justify-between items-center group relative hover:bg-stone-50 dark:hover:bg-stone-800/30 p-1 -mx-1 rounded-md smooth-transition" onDragOver={(e) => handleDragOver(e, catIdx)} onDrop={(e) => handleDropOnItem(e, catIdx, itemIdx)}>
                                                    <div className="flex items-center gap-1.5 flex-1 overflow-hidden">
                                                        <div draggable="true" onDragStart={(e) => handleDragStart(e, catIdx, itemIdx)} onDragEnd={handleDragEnd} className="text-stone-300 dark:text-stone-600 hover:text-stone-500 dark:hover:text-stone-400 drag-handle p-1 shrink-0" title="拖曳移動"><Icons.GripVertical /></div>
                                                        <label className="text-[11px] md:text-xs text-stone-600 dark:text-stone-400 font-medium truncate">{item.label}</label>
                                                    </div>
                                                    <div className="flex items-center gap-2 shrink-0">
                                                        <div className="relative flex items-center w-24 md:w-28 bg-stone-100/50 dark:bg-stone-800/40 border border-stone-200/60 dark:border-stone-700/60 rounded-md focus-within:border-stone-400 smooth-transition overflow-hidden">
                                                            <span className="text-stone-400 text-xs pl-2 font-medium pointer-events-none">$</span>
                                                            <input type="number" value={item.value} onChange={(e) => handleChange(catIdx, itemIdx, e.target.value)} placeholder="0" className="w-full bg-transparent outline-none py-1 px-2 text-right font-bold text-stone-800 dark:text-stone-200 text-sm placeholder-stone-400/30" />
                                                        </div>
                                                        <button onClick={() => handleDelete(catIdx, itemIdx)} className="text-stone-300 hover:text-red-500 dark:text-stone-600 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 focus:opacity-100 smooth-transition p-1 shrink-0" title="刪除"><Icons.X /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </Card>
                            ))}
                        </div>

                        <div className="lg:col-span-1 space-y-6 sticky top-24">
                            <Card className="p-6 md:p-8 flex flex-col items-center justify-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-sage-200/20 dark:bg-sage-800/20 rounded-bl-full -mr-16 -mt-16 pointer-events-none"></div>
                                <h3 className="text-xs text-stone-500 tracking-widest mb-6 font-bold uppercase w-full text-left">
                                    {currentScenario?.name} 每月總開支
                                </h3>
                                
                                <div className="relative w-48 h-48 md:w-56 md:h-56">
                                    <canvas ref={chartRef}></canvas>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                        <span className="text-[10px] md:text-xs text-stone-500 tracking-widest mb-1">Total (HKD)</span>
                                        <span className="text-2xl md:text-3xl font-black text-stone-900 dark:text-stone-100">${totalBudget.toLocaleString()}</span>
                                    </div>
                                </div>

                                <div className="w-full mt-8 space-y-2.5">
                                    {categoryTotals.sort((a,b) => b.total - a.total).map(cat => {
                                        if (cat.total === 0) return null;
                                        const pct = ((cat.total / totalBudget) * 100).toFixed(1);
                                        return (
                                            <div key={cat.id} className="flex justify-between items-center text-xs md:text-sm">
                                                <div className="flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor: cat.color}}></span><span className="text-stone-600 dark:text-stone-400">{cat.label}</span></div>
                                                <div className="flex gap-3 text-right"><span className="font-bold text-stone-800 dark:text-stone-200">${cat.total.toLocaleString()}</span><span className="text-stone-400 w-8">{pct}%</span></div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </Card>
                            
                            {!isSynced && currentScenario?.syncTarget !== 'none' && (
                                <div className="bg-amber-50/80 dark:bg-amber-900/20 border border-amber-200/80 dark:border-amber-800/50 rounded-xl p-4 flex gap-3 items-start animate-pulse-slow">
                                    <div className="text-amber-500 mt-0.5"><Icons.Activity /></div>
                                    <div>
                                        <p className="text-xs font-bold text-amber-800 dark:text-amber-400 mb-1">尚未同步至全域設定</p>
                                        <p className="text-[10px] text-amber-700/80 dark:text-amber-500">{unsyncedWarningText} 請點擊上方按鈕進行同步。</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function RebalanceTab({ rawNewMoney, setRawNewMoney, tickers, setTickers }) {
            const [isOcrProcessing, setIsOcrProcessing] = useState(false);
            const [ocrProgress, setOcrProgress] = useState('');
            const fileInputRef = useRef(null);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsOcrProcessing(true); setOcrProgress('啟動視覺引擎...');
                try {
                    if (!window.Tesseract) throw new Error("OCR not loaded");
                    const { data: { text } } = await window.Tesseract.recognize(file, 'eng+chi_tra', { logger: m => { if (m.status === 'recognizing text') setOcrProgress(`分析截圖中... ${Math.round(m.progress * 100)}%`); } });
                    setOcrProgress('資料匹配中...');
                    let parsedNewMoney = rawNewMoney;
                    const cashMatch = text.match(/(?:總計現金|總\s*計\s*現\s*金|現金餘額|總計|Total\s*Cash)[^\d]*?([\d,]+\.\d{2})/i);
                    if (cashMatch) { const cashVal = parseFloat(cashMatch[1].replace(/,/g, '')); if (!isNaN(cashVal)) parsedNewMoney = cashVal; }
                    const newTickers = [...tickers];
                    newTickers.forEach((t, idx) => {
                        const tickerRegex = new RegExp(t.symbol + '[^\\d]*?([\\d,]+(?:\\.\\d{2})?)', 'i');
                        const tMatch = text.match(tickerRegex);
                        if (tMatch) { const val = parseFloat(tMatch[1].replace(/,/g, '')); if (!isNaN(val)) newTickers[idx].currentVal = val; }
                    });
                    setTickers(newTickers); setRawNewMoney(parsedNewMoney);
                    setOcrProgress('讀取並填寫完成！');
                } catch (error) { setOcrProgress('影像無法辨識，請手動輸入'); }
                setTimeout(() => setIsOcrProcessing(false), 2000);
                if(fileInputRef.current) fileInputRef.current.value = '';
            };

            const actualNewMoney = num(rawNewMoney) / 1.01; 
            const totalCurrent = tickers.reduce((sum, t) => sum + num(t.currentVal), 0);
            const targetTotal = totalCurrent + actualNewMoney;

            const rows = tickers.map(t => {
                const targetValue = targetTotal * (t.targetPct / 100);
                const gap = targetValue - num(t.currentVal);
                return { ...t, targetValue, gap };
            });

            const positiveGaps = rows.map(r => Math.max(0, r.gap));
            const sumPositiveGaps = positiveGaps.reduce((sum, g) => sum + g, 0);
            const finalRows = rows.map((r, i) => {
                const gapPct = sumPositiveGaps > 0 ? positiveGaps[i] / sumPositiveGaps : 0;
                const buyAmount = Math.round(actualNewMoney * gapPct);
                return { ...r, gapPct, buyAmount };
            });

            return (
                <div className="space-y-6 md:space-y-8 animate-fade-in-up">
                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <SectionTitle title="資產再平衡計算機" subtitle="Rebalancing Calculator" className="mb-0" />
                        <input type="file" accept="image/*" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                        <button onClick={() => fileInputRef.current && fileInputRef.current.click()} disabled={isOcrProcessing} className={`flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-xs md:text-sm font-bold smooth-transition shadow-sm border ${isOcrProcessing ? 'bg-sage-900/50 text-sage-200 border-sage-800 cursor-not-allowed' : 'bg-stone-800 hover:bg-stone-900 dark:bg-stone-800 dark:hover:bg-stone-700 text-stone-100 dark:text-stone-200 border-transparent dark:border-stone-700 active:scale-95'}`}>
                            <Icons.Upload />{isOcrProcessing ? ocrProgress : '上傳 IB 截圖自動填寫'}
                        </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        <Card className="p-4 md:p-6 bg-amber-50/40 dark:bg-amber-900/10 border-amber-200/40 dark:border-amber-800/20">
                            <label className="text-[10px] md:text-xs text-amber-800 dark:text-amber-500 font-bold uppercase tracking-widest mb-2 block">1. 準備投入新資金 (USD)</label>

                let totalInvested = 0, historicalReturned = 0;
                const positiveRecords = records.filter(r => Number(r.amount) > 0 && r.date).sort((a, b) => new Date(b.date) - new Date(a.date));
                const latestPositiveId = positiveRecords.length > 0 ? positiveRecords[0].id : null;
                const currentMarketValue = positiveRecords.length > 0 ? Number(positiveRecords[0].amount) : 0;
                records.forEach(r => {
                    const amt = Number(r.amount);
                    if (!isNaN(amt)) {
                        if (amt < 0) totalInvested += Math.abs(amt);
                        else if (amt > 0 && r.id !== latestPositiveId) historicalReturned += amt;
                    }
                });
                const profit = (historicalReturned + currentMarketValue) - totalInvested;
                const roi = totalInvested > 0 ? (profit / totalInvested) * 100 : 0;
                const rawXirr = calculateXIRR(records);
                return { totalInvested, historicalReturned, currentMarketValue, profit, roi, xirrPercent: rawXirr !== null ? (rawXirr * 100).toFixed(2) : null };
            }, [records]);

                                callbacks: {

                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-4 border-t border-stone-200 dark:border-stone-800">

                        <Card className="p-4 md:p-6 flex flex-col h-full">

            const handleAddStage = () => {
                const newStages = [...fireStages];
                const lastStage = newStages.pop(); 
                newStages.push({
                    id: `s_${Date.now()}`,
                    name: `新階段 ${newStages.length + 1}`,

                    isLast: false

            const handleRemoveStage = (idx) => {
                if (fireStages.length <= 1 || fireStages[idx].isLast) return;

                newStages.splice(idx, 1);

            };

            const safeTarget = num(target);

            useEffect(() => {
                if (!chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();
